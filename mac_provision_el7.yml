---
- name: Prepare and create CENTOS hosts in Foreman using NetBox + ESXi
  hosts: localhost
  connection: local
  gather_facts: false

  vars:

    ###########################################################################
    # NetBox
    ###########################################################################

    netbox_url: "https://rocky-08-03.vgs.com"
    netbox_token: "83fb0cec1adff8ff4f36c9185df6b9e2f07c7fcd"

    ###########################################################################
    # Foreman
    ###########################################################################

    foreman_url: "https://rocky-08-01.vgs.com"
    foreman_user: "admin"
    foreman_password: "zqs977dXzqfEvTML"

    ###########################################################################
    # ESXi
    ###########################################################################

    esxi_hostname: "192.168.253.128"
    vm_root_user: "root"
    vm_root_password: "Root@123"
    guest_domain: "vgs.com"

    ###########################################################################
    # Host Settings
    ###########################################################################

    host_root_pass: "Root@123"

    cluster_name: "centos-07-servers"

    target_servers:
      - cent-07-03
      - cent-07-04

    ###########################################################################
    # Foreman IDs
    ###########################################################################

    org_id: 1
    loc_id: 2
    hostgroup_id: 1

  tasks:

###########################################################################
# Get Devices from NetBox
###########################################################################

    - name: Get devices from NetBox cluster
      uri:
        url: "{{ netbox_url }}/api/dcim/devices/?cluster={{ cluster_name }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: false
      register: netbox_devices

    - name: Show devices
      debug:
        msg: "{{ netbox_devices.json.results | map(attribute='name') | list }}"

###########################################################################
# Filter required servers
###########################################################################

    - name: Initialize filtered device list
      set_fact:
        filtered_devices: []

    - name: Filter target servers
      set_fact:
        filtered_devices: "{{ filtered_devices + [item] }}"
      loop: "{{ netbox_devices.json.results }}"
      when:
        - item.name.split('.')[0] in target_servers

    - debug:
        var: filtered_devices

    - name: Fail if nothing matched
      fail:
        msg: "No matching devices found in NetBox."
      when: filtered_devices | length == 0

###########################################################################
# Get IPs from NetBox
###########################################################################

    - name: Get IP Addresses
      uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: false
      register: netbox_ips

###########################################################################
# Get MAC Address from ESXi
###########################################################################

    - name: Gather VM information from ESXi
      community.vmware.vmware_guest_info:
        hostname: "{{ esxi_hostname }}"
        username: "{{ vm_root_user }}"
        password: "{{ vm_root_password }}"
        validate_certs: false
        name: "{{ item.name.split('.')[0] }}"
      loop: "{{ filtered_devices }}"
      delegate_to: localhost
      register: vm_info

###########################################################################
# Build host information
###########################################################################

    - name: Initialize host list
      set_fact:
        host_info: []

    - name: Build host information
      set_fact:
        host_info: "{{ host_info + [ {
          'name': item.item.name,
          'ip': (
            netbox_ips.json.results
            | selectattr('assigned_object.device.name','equalto',item.item.name)
            | map(attribute='address')
            | map('regex_replace','/.*$','')
            | first
            | default('')
          ),
          'mac': (
            item.instance.hw_eth0.macaddress
            | default(
                (
                  item.instance.hw_interfaces
                  | default([])
                  | first
                  | default({})
                ).macaddress
            )
          )
        } ] }}"
      loop: "{{ vm_info.results }}"

    - name: Show host info
      debug:
        var: host_info

###########################################################################
# Create Hosts in Foreman
###########################################################################

    - name: Create Hosts
      uri:
        url: "{{ foreman_url }}/api/hosts"
        method: POST
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code:
          - 200
          - 201
        headers:
          Content-Type: application/json
        body_format: json
        body:
          host:
            name: "{{ item.name }}"
            hostgroup_id: "{{ hostgroup_id }}"
            organization_id: "{{ org_id }}"
            location_id: "{{ loc_id }}"
            managed: true
            build: true
            pxe_loader: "Grub2 UEFI"
            root_pass: "{{ host_root_pass }}"
            interfaces_attributes:
              - type: interface
                mac: "{{ item.mac }}"
                ip: "{{ item.ip }}"
                primary: true
                provision: true
      loop: "{{ host_info }}"
      register: foreman_create

###########################################################################
# Results
###########################################################################

    - name: Show Foreman results
      debug:
        var: foreman_create
