---
- name: Rocky Linux 8 to Rocky Linux 9 - ELevate Migration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: false
  become: true
  become_method: sudo
  become_user: root
  serial: 1

  vars:
  
    repo_server: "http://192.168.253.136"
    
    rocky9_repo: "{{ 'rocky9.2' if (target_os | default('9')) == '9.2' else 'rocky9' }}"
    
    elevate_repo_url: >-
      {{ repo_server }}/repo/leapp/{{
         '9.2' if (target_os | default('9')) == '9.2'
         else '9'
      }}/el8toel9
    
    rocky8_baseos: "{{ repo_server }}/repo/rocky8/BaseOS"
    rocky8_appstream: "{{ repo_server }}/repo/rocky8/AppStream"
    
#    rocky9_baseos: "{{ repo_server }}/repo/{{ rocky9_repo }}/BaseOS"
#    rocky9_appstream: "{{ repo_server }}/repo/{{ rocky9_repo }}/AppStream"
    
    elevate_repo_file: /etc/yum.repos.d/el8toel9.repo
    leapp_repo_file: /etc/leapp/files/leapp_upgrade_repositories.repo
  ####################################################################
  # Bootstrap
  ####################################################################

  pre_tasks:

    - name: Ensure Python is installed
      raw: |
        if ! command -v python3 >/dev/null 2>&1; then
          dnf -y install python3
        fi
      changed_when: false

    - meta: reset_connection

    - name: Gather facts
      setup:

    ##################################################################
    # Validate Operating System
    ##################################################################

    - name: Fail when OS is not Rocky Linux
      fail:
        msg: "This playbook supports only Rocky Linux."
      when: ansible_distribution != "Rocky"

    - name: End play if already Rocky Linux 9
      meta: end_play
      when:
        - ansible_distribution == "Rocky"
        - ansible_distribution_major_version == "9"

    - name: Validate Rocky Linux version
      fail:
        msg: "Only Rocky Linux 8.x can be migrated."
      when: ansible_distribution_major_version != "8"

    ##################################################################
    # Connectivity Checks
    ##################################################################

    - name: Verify repository server is reachable
      uri:
        url: "{{ elevate_repo_url }}"
        method: HEAD
        status_code:
          - 200
          - 301
          - 302
      register: repo_check
      retries: 5
      delay: 5
      until: repo_check.status in [200,301,302]

    - name: Display repository status
      debug:
        msg: "Repository server is reachable."

  ####################################################################
  # Configure Repositories
  ####################################################################

  tasks:

    - name: Backup existing repositories
      shell: |
        mkdir -p /etc/yum.repos.d/backup
        find /etc/yum.repos.d -maxdepth 1 -name "*.repo" \
        -exec mv {} /etc/yum.repos.d/backup/ \;
      args:
        executable: /bin/bash

    - name: Configure Rocky Linux 8 repositories
      copy:
        dest: "{{ elevate_repo_file }}"
        mode: "0644"
        content: |
          [el8toel9]
          name=ELevate Repository
          baseurl={{ elevate_repo_url }}
          enabled=1
          gpgcheck=0

          [rocky8-baseos]
          name=Rocky Linux 8 BaseOS
          baseurl={{ rocky8_baseos }}
          enabled=1
          gpgcheck=0

          [rocky8-appstream]
          name=Rocky Linux 8 AppStream
          baseurl={{ rocky8_appstream }}
          enabled=1
          gpgcheck=0

    ####################################################################
    # Refresh DNF
    ####################################################################

    - name: Remove DNF cache
      file:
        path: /var/cache/dnf
        state: absent

    - name: Clean DNF metadata
      command: dnf clean all

    - name: Rebuild metadata
      command: dnf makecache

    ####################################################################
    # Remove Leapp Exclusions
    ####################################################################
    
    - name: Remove DNF exclude for Leapp packages
      lineinfile:
        path: /etc/dnf/dnf.conf
        regexp: '^exclude='
        state: absent
    
    - name: Clean DNF metadata after removing excludes
      command: dnf clean all
    
    - name: Remove DNF cache again
      file:
        path: /var/cache/dnf
        state: absent
    
    - name: Rebuild DNF metadata
      command: dnf makecache

    ####################################################################
    # Install ELevate
    ####################################################################

    - name: Install ELevate packages
      dnf:
        name:
          - leapp
          - python3-leapp
          - leapp-deps
          - snactor
          - leapp-data-rocky
          - leapp-upgrade-el8toel9
          - leapp-upgrade-el8toel9-deps
        state: present

    - name: Verify installed Leapp packages
      shell: |
        rpm -qa | egrep '^(leapp|python3-leapp|snactor)' | sort
      register: leapp_packages
      changed_when: false

    - name: Display installed Leapp packages
      debug:
        var: leapp_packages.stdout_lines

    ####################################################################
    # Verify Leapp
    ####################################################################

    - name: Verify leapp command
      command: leapp --version
      register: leapp_version
      changed_when: false

    - name: Display leapp version
      debug:
        var: leapp_version.stdout_lines

    ####################################################################
    # Configure Leapp Repository
    ####################################################################

    - name: Ensure Leapp files directory exists
      file:
        path: /etc/leapp/files
        state: directory
        mode: "0755"

#    - name: Configure Rocky Linux 9 repositories for Leapp
#      copy:
#        dest: "{{ leapp_repo_file }}"
#        mode: "0644"
#        content: |
#          [rocky9-baseos]
#          name=Rocky Linux 9 BaseOS
#          baseurl={{ rocky9_baseos }}
#          enabled=1
#          gpgcheck=0
#
#          [rocky9-appstream]
#          name=Rocky Linux 9 AppStream
#          baseurl={{ rocky9_appstream }}
#          enabled=1
#          gpgcheck=0

    ####################################################################
    # Validate Repositories
    ####################################################################

    - name: Verify Rocky 9 BaseOS repository
      uri:
        url: "{{ rocky9_baseos }}/repodata/repomd.xml"
        method: HEAD
        status_code: 200

    - name: Verify Rocky 9 AppStream repository
      uri:
        url: "{{ rocky9_appstream }}/repodata/repomd.xml"
        method: HEAD
        status_code: 200

    - name: Verify ELevate repository
      uri:
        url: "{{ elevate_repo_url }}/repodata/repomd.xml"
        method: HEAD
        status_code: 200

    ####################################################################
    # Remove Previous Leapp Data
    ####################################################################

    - name: Remove previous Leapp logs
      file:
        path: /var/log/leapp
        state: absent

    - name: Remove previous Leapp cache
      file:
        path: /var/lib/leapp
        state: absent

    - name: Create fresh Leapp log directory
      file:
        path: /var/log/leapp
        state: directory
        mode: "0755"

    ####################################################################
    # Prepare System
    ####################################################################

    - name: Set SELinux to permissive
      command: setenforce 0
      when:
        - ansible_selinux is defined
        - ansible_selinux.status == "enabled"
      ignore_errors: yes

    - name: Disable direct root SSH login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: 'PermitRootLogin no'
        create: yes
        backup: yes

    ####################################################################
    # Remove Loaded Modules
    ####################################################################

    - name: Unload floppy module
      shell: |
        lsmod | grep -q '^floppy' && modprobe -r floppy || true
      changed_when: false

    - name: Unload pata_acpi module
      shell: |
        lsmod | grep -q '^pata_acpi' && modprobe -r pata_acpi || true
      changed_when: false

    ####################################################################
    # Generate Initial Answerfile
    ####################################################################

    - name: Check for EL7 packages
      shell: rpm -qa | grep '\.el7' || true
      register: el7_packages
      changed_when: false
    
    - name: Fail if EL7 packages exist
      fail:
        msg: |
          EL7 packages detected:
    
          {{ el7_packages.stdout }}
    
          Remove these packages before running ELevate.
      when: el7_packages.stdout != ""

    - name: Run initial Leapp preupgrade
      command: leapp preupgrade
      register: preupgrade_initial
      failed_when: false
      changed_when: true

    - name: Display initial preupgrade output
      debug:
        var: preupgrade_initial.stdout_lines

    - name: Verify answerfile exists
      stat:
        path: /var/log/leapp/answerfile
      register: answerfile

    - name: Fail if initial preupgrade failed unexpectedly
      fail:
        msg: |
          Initial Leapp preupgrade failed.

          stdout:
          {{ preupgrade_initial.stdout }}

          stderr:
          {{ preupgrade_initial.stderr }}
      when:
        - preupgrade_initial.rc != 0
        - not answerfile.stat.exists

    - name: Fail when answerfile is missing
      fail:
        msg: "Leapp answerfile was not generated."
      when: not answerfile.stat.exists

    ####################################################################
    # Answer Leapp Questions
    ####################################################################

    - name: Answer authselect question
      command: >
        leapp answer
        --section authselect_check.confirm=True
      failed_when: false

    - name: Answer pam_pkcs11 question
      command: >
        leapp answer
        --section remove_pam_pkcs11_module_check.confirm=True
      failed_when: false

    ####################################################################
    # Fix Firewalld AllowZoneDrifting
    ####################################################################
    
    - name: Ensure AllowZoneDrifting is disabled
      lineinfile:
        path: /etc/firewalld/firewalld.conf
        regexp: '^#?AllowZoneDrifting='
        line: 'AllowZoneDrifting=no'
        insertafter: EOF
        create: yes
        backup: yes
      ignore_errors: yes
    
    - name: Reload firewalld if running
      shell: |
        if systemctl is-active --quiet firewalld; then
          firewall-cmd --reload
        fi
      changed_when: false
      ignore_errors: yes

    ####################################################################
    # Execute Final Preupgrade
    ####################################################################

    - name: Run Leapp preupgrade
      command: leapp preupgrade
      register: preupgrade
      changed_when: true

    - name: Read Leapp report
      slurp:
        src: /var/log/leapp/leapp-report.txt
      register: leapp_report

    - name: Save report text
      set_fact:
        leapp_report_text: "{{ leapp_report.content | b64decode }}"

    ####################################################################
    # Detect Inhibitors
    ####################################################################

    - name: Detect inhibitors
      set_fact:
        inhibitors_found: "{{ 'Risk Factor: high (inhibitor)' in leapp_report_text }}"

    - name: Display inhibitor status
      debug:
        msg: >-
          {{
            'No inhibitors detected.'
            if not inhibitors_found
            else
            'Leapp inhibitors detected.'
          }}

    - name: Stop migration when inhibitors exist
      fail:
        msg: |
          Leapp inhibitors detected.

          Review:

          /var/log/leapp/leapp-report.txt

          Resolve all inhibitors before rerunning this playbook.
      when: inhibitors_found

    ####################################################################
    # Prepare Final Upgrade
    ####################################################################

    - name: Check if rocky-logos is installed
      shell: rpm -q rocky-logos
      register: rocky_logos
      failed_when: false
      changed_when: false

    - name: Remove Rocky 8 logos package to avoid EL9 file conflict
      command: rpm -e --nodeps rocky-logos
      when: rocky_logos.rc == 0

    - name: Verify rocky-logos has been removed
      shell: rpm -q rocky-logos
      register: rocky_logos_removed
      failed_when: false
      changed_when: false

    - name: Display rocky-logos status
      debug:
        msg: >-
          {{
            'rocky-logos removed successfully.'
            if rocky_logos_removed.rc != 0
            else
            'rocky-logos is still installed.'
          }}

    - name: Disable network naming scheme check for Leapp
      lineinfile:
        path: /etc/environment
        regexp: '^LEAPP_DISABLE_NET_NAMING_SCHEMES='
        line: 'LEAPP_DISABLE_NET_NAMING_SCHEMES=1'
        create: yes

    - name: Export LEAPP_DISABLE_NET_NAMING_SCHEMES for current session
      shell: export LEAPP_DISABLE_NET_NAMING_SCHEMES=1
      changed_when: false

    ####################################################################
    # Execute Upgrade
    ####################################################################

    - name: Run Leapp upgrade
      command: leapp upgrade
      register: leapp_upgrade
      changed_when: true
      failed_when: leapp_upgrade.rc != 0

    - name: Display Leapp upgrade output
      debug:
        var: leapp_upgrade.stdout_lines

    ####################################################################
    # Verify Upgrade Environment
    ####################################################################

    - name: Verify Leapp upgrade initramfs exists
      stat:
        path: "/boot/initramfs-{{ ansible_kernel }}.img"
      register: initramfs_check

    - name: Show initramfs status
      debug:
        msg: "Leapp upgrade initramfs generated successfully."
      when: initramfs_check.stat.exists

    ####################################################################
    # Final Reboot
    ####################################################################

    - name: Reboot to start Rocky Linux 9 migration
      reboot:
        msg: "Starting Rocky Linux 9 ELevate migration"
        connect_timeout: 5
        reboot_timeout: 7200
        pre_reboot_delay: 10
        post_reboot_delay: 0

    ####################################################################
    # End Play
    ####################################################################

    - name: Display migration message
      debug:
        msg:
          - "The system has rebooted into the Leapp upgrade environment."
          - "Leapp will perform the migration automatically."
          - "The host will reboot again when the migration completes."
          - "Run Rocky9_Post_Migration_Cleanup.yml after the host is back online."

    - meta: end_play
