---
- name: Rocky Linux 9 - Post Migration Cleanup
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: false
  become: true
  become_method: sudo
  become_user: root
  serial: 1

  vars:
    rocky9_repo: "{{ 'rocky9.2' if (target_os | default('9')) == '9.2' else 'rocky9' }}"
    elevate_repo_file: /etc/yum.repos.d/el8toel9.repo
    leapp_repo_file: /etc/leapp/files/leapp_upgrade_repositories.repo

  ####################################################################
  # Bootstrap
  ####################################################################

  pre_tasks:

    - name: Wait for SSH
      wait_for_connection:
        timeout: 7200
        delay: 30
        sleep: 15

    - name: Ensure Python 3 is installed
      raw: |
        if ! command -v python3 >/dev/null 2>&1; then
          dnf -y install python3
        fi
      changed_when: false

    - meta: reset_connection

    - name: Use Python 3
      set_fact:
        ansible_python_interpreter: /usr/bin/python3

    - name: Gather facts
      setup:

    ####################################################################
    # Verify Rocky Linux 9
    ####################################################################

    - name: Verify operating system
      fail:
        msg: |
          Migration has not completed successfully.

          Current operating system:

          {{ ansible_distribution }}
          {{ ansible_distribution_version }}

          This playbook only supports Rocky Linux 9.
      when:
        - ansible_distribution != "Rocky"
          or ansible_distribution_major_version != "9"

    - name: Display operating system
      debug:
        msg:
          - "Operating System : {{ ansible_distribution }}"
          - "Version          : {{ ansible_distribution_version }}"
          - "Kernel           : {{ ansible_kernel }}"

    ####################################################################
    # Verify Kernel
    ####################################################################

    - name: Check running kernel
      command: uname -r
      register: running_kernel
      changed_when: false

    - name: Display running kernel
      debug:
        var: running_kernel.stdout

    - name: Ensure EL9 kernel is running
      fail:
        msg: |
          System is not booted into an EL9 kernel.

          Current kernel:

          {{ running_kernel.stdout }}
      when:
        - "'el9' not in running_kernel.stdout"

    ####################################################################
    # Verify RPM Database
    ####################################################################

    - name: Verify RPM database
      command: rpm --verifydb
      register: rpm_verify
      changed_when: false
      failed_when: false

    - name: Rebuild RPM database if needed
      command: rpm --rebuilddb
      when: rpm_verify.rc != 0

    ####################################################################
    # Refresh DNF
    ####################################################################

    - name: Clean DNF cache
      command: dnf clean all
      changed_when: false

    - name: Remove DNF cache
      file:
        path: /var/cache/dnf
        state: absent

    - name: Rebuild DNF cache
      command: dnf makecache

    ####################################################################
    # Verify Repositories
    ####################################################################

    - name: List enabled repositories
      command: dnf repolist
      register: repo_list
      changed_when: false

    - name: Display enabled repositories
      debug:
        var: repo_list.stdout_lines

    ####################################################################
    # Verify Rocky Release Package
    ####################################################################

    - name: Verify rocky-release package
      command: rpm -q rocky-release
      register: rocky_release
      changed_when: false

    - name: Display rocky-release package
      debug:
        var: rocky_release.stdout

    ####################################################################
    # Remove Remaining EL8 Packages
    ####################################################################

    - name: Find remaining EL8 packages
      shell: |
        rpm -qa | grep '\.el8' | \
          grep -vE '^(gpg-pubkey|kernel|kernel-core|kernel-modules|kernel-modules-extra|kernel-tools|kernel-tools-libs|leapp|leapp-data)' || true
      register: el8_packages
      changed_when: false

    - name: Display remaining EL8 packages
      debug:
        var: el8_packages.stdout_lines
      when: el8_packages.stdout != ""

    - name: Remove remaining EL8 packages
      dnf:
        name: "{{ el8_packages.stdout_lines }}"
        state: absent
        allowerasing: true
      when: el8_packages.stdout != ""

    ####################################################################
    # Remove Old EL8 Kernels
    ####################################################################

    - name: Find EL8 kernels
      shell: |
        rpm -qa | grep '^kernel.*el8'
      register: el8_kernels
      changed_when: false

    - name: Display EL8 kernels
      debug:
        var: el8_kernels.stdout_lines
      when: el8_kernels.stdout != ""

    - name: Remove EL8 kernels
      dnf:
        name: "{{ el8_kernels.stdout_lines }}"
        state: absent
      when: el8_kernels.stdout != ""

    ####################################################################
    # Remove ELevate Packages
    ####################################################################

    - name: Remove Leapp packages
      dnf:
        name:
          - leapp
          - leapp-data-rocky
          - leapp-upgrade-el8toel9
        state: absent
      ignore_errors: yes

    ####################################################################
    # Remove Temporary Repositories
    ####################################################################
    
    - name: Remove ELevate repository
      file:
        path: "{{ elevate_repo_file }}"
        state: absent
    
    - name: Remove Leapp repository file
      file:
        path: "{{ leapp_repo_file }}"
        state: absent

    ####################################################################
    # Configure Offline Rocky Linux 9 Repositories
    ####################################################################
    
    - name: Create repository backup directory
      file:
        path: /etc/yum.repos.d/backup
        state: directory
        mode: '0755'
    
    - name: Find existing repository files
      find:
        paths: /etc/yum.repos.d
        patterns: "*.repo"
        excludes:
          - rocky9.repo
      register: repo_files
    
    - name: Backup existing repository files
      copy:
        src: "{{ item.path }}"
        dest: "/etc/yum.repos.d/backup/{{ item.path | basename }}"
        remote_src: true
      loop: "{{ repo_files.files }}"
    
    - name: Remove existing repository files
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ repo_files.files }}"
    
    - name: Create Rocky Linux 9 offline repository
      copy:
        dest: /etc/yum.repos.d/rocky9.repo
        mode: '0644'
        content: |
          [rocky9-baseos]
          name=Rocky Linux 9 BaseOS
          baseurl=http://http-server-01/repo/{{ rocky9_repo }}/BaseOS/
          enabled=1
          gpgcheck=0
    
          [rocky9-appstream]
          name=Rocky Linux 9 AppStream
          baseurl=http://http-server-01/repo/{{ rocky9_repo }}/AppStream/
          enabled=1
          gpgcheck=0
    
    - name: Verify offline repositories
      command: dnf repolist
      register: offline_repo
      changed_when: false
    
    - name: Display configured repositories
      debug:
        var: offline_repo.stdout_lines

    ####################################################################
    # Refresh DNF
    ####################################################################

    - name: Clean DNF cache
      command: dnf clean all
      changed_when: false

    - name: Remove DNF cache
      file:
        path: /var/cache/dnf
        state: absent

    - name: Rebuild DNF cache
      command: dnf makecache

    ####################################################################
    # Remove Leapp Working Directories
    ####################################################################

    - name: Remove Leapp log directory
      file:
        path: /var/log/leapp
        state: absent

    - name: Remove Leapp cache directory
      file:
        path: /var/lib/leapp
        state: absent

    - name: Remove Leapp answerfile
      file:
        path: /var/log/leapp/answerfile
        state: absent
      ignore_errors: yes

    ####################################################################
    # Verify Package Manager
    ####################################################################

    - name: Verify DNF
      command: dnf --version
      register: dnf_version
      changed_when: false

    - name: Display DNF version
      debug:
        var: dnf_version.stdout_lines

    ####################################################################
    # Rebuild Boot Configuration
    ####################################################################

    - name: Determine BIOS or UEFI
      stat:
        path: /sys/firmware/efi
      register: efi

    - name: Regenerate GRUB (BIOS)
      command: grub2-mkconfig -o /boot/grub2/grub.cfg
      when: not efi.stat.exists

    - name: Locate UEFI grub.cfg
      command: find /boot/efi/EFI -name grub.cfg
      register: grub_cfg
      changed_when: false
    
    - name: Regenerate UEFI GRUB
      command:
        argv:
          - grub2-mkconfig
          - -o
          - "{{ grub_cfg.stdout_lines[0] }}"
      when:
        - efi.stat.exists
        - grub_cfg.stdout_lines | length > 0

    ####################################################################
    # Rebuild Initramfs
    ####################################################################

    - name: Rebuild initramfs
      command: dracut -f /boot/initramfs-{{ running_kernel.stdout }}.img {{ running_kernel.stdout }}  

    ####################################################################
    # Clean Temporary Files
    ####################################################################

    - name: Remove temporary files
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /tmp/leapp
        - /root/tmp_leapp_py3
        - /var/tmp/leapp
      ignore_errors: yes

    ####################################################################
    # Final Package Cleanup
    ####################################################################

    - name: Remove orphan packages
      command: dnf autoremove -y
      register: autoremove_result
      failed_when: false
      changed_when: "'Nothing to do' not in autoremove_result.stdout"

    - name: Clean package cache
      command: dnf clean packages
      changed_when: false

    - name: Display remaining boot loader entries
      command: ls -1 /boot/loader/entries
      register: boot_entries
      changed_when: false

    - debug:
        var: boot_entries.stdout_lines

    ####################################################################
    # Final Reboot
    ####################################################################

    - name: Final reboot
      reboot:
        msg: "Final reboot after Rocky Linux 9 cleanup"
        connect_timeout: 5
        reboot_timeout: 1800
        pre_reboot_delay: 5
        post_reboot_delay: 30

    - meta: reset_connection

    - name: Wait for SSH
      wait_for_connection:
        timeout: 1800
        delay: 20
        sleep: 10

    - name: Gather facts
      setup:

    ####################################################################
    # Final Validation
    ####################################################################

    - name: Verify Rocky Linux 9
      fail:
        msg: "System is not running Rocky Linux 9."
      when: >
        ansible_distribution != "Rocky" or
        ansible_distribution_major_version != "9"

    - name: Verify kernel
      fail:
        msg: "System is not running an EL9 kernel."
      when:
        - "'el9' not in ansible_kernel"

    - name: Verify DNF
      command: dnf repolist
      register: final_repo
      changed_when: false

    - name: Display repository list
      debug:
        var: final_repo.stdout_lines

    - name: Display operating system
      debug:
        msg:
          - "Operating System : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel           : {{ ansible_kernel }}"
          - "Architecture     : {{ ansible_architecture }}"

    ####################################################################
    # Migration Summary
    ####################################################################

    - name: Display migration summary
      debug:
        msg:
          - "===================================================="
          - " Rocky Linux 8 -> Rocky Linux 9 Migration Complete "
          - "===================================================="
          - "Hostname        : {{ inventory_hostname }}"
          - "Operating System: {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Kernel          : {{ ansible_kernel }}"
          - "Architecture    : {{ ansible_architecture }}"
          - "Python          : {{ ansible_python.version.major }}.{{ ansible_python.version.minor }}"
          - "Migration Status: SUCCESS"
          - "===================================================="
