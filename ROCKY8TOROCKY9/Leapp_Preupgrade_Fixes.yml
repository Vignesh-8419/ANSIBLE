---
- name: Leapp Preupgrade Fixes
  hosts: >-
    {{
      target_hosts
      | split(',')
      | map('trim')
      | reject('equalto', '')
      | map('regex_replace', '$', '.vgs.com')
      | join(',')
    }}
  become: yes
  become_method: sudo
  become_user: root
  gather_facts: false
  serial: 1

  handlers:

    - name: Restart NetworkManager
      service:
        name: NetworkManager
        state: restarted

  tasks:

    ###########################################################################
    # Remove exclude from dnf.conf
    ###########################################################################

    - name: Remove exclude entries from /etc/dnf/dnf.conf
      lineinfile:
        path: /etc/dnf/dnf.conf
        regexp: '^exclude='
        state: absent
        backup: yes
      ignore_errors: yes

    ###########################################################################
    # Find repository files
    ###########################################################################

    - name: Find yum repository files
      find:
        paths: /etc/yum.repos.d
        patterns: "*.repo"
        file_type: file
      register: repo_files

    - name: Remove exclude entries from repository files
      lineinfile:
        path: "{{ item.path }}"
        regexp: '^exclude='
        state: absent
        backup: yes
      loop: "{{ repo_files.files }}"
      loop_control:
        label: "{{ item.path }}"

    ###########################################################################
    # Detect active interface
    ###########################################################################

    - name: Detect active network interface
      shell: |
        ip route | awk '/^default/ {print $5; exit}'
      register: active_if
      changed_when: false

    - name: Show detected interface
      debug:
        msg: "Active interface: {{ active_if.stdout }}"

    - name: Check if ifcfg file exists
      stat:
        path: "/etc/sysconfig/network-scripts/ifcfg-{{ active_if.stdout }}"
      register: ifcfg_file

    ###########################################################################
    # Update ifcfg file
    ###########################################################################

    - name: Ensure TYPE=Ethernet
      lineinfile:
        path: "/etc/sysconfig/network-scripts/ifcfg-{{ active_if.stdout }}"
        regexp: '^TYPE='
        line: "TYPE=Ethernet"
        insertafter: EOF
        backup: yes
      when: ifcfg_file.stat.exists
      notify: Restart NetworkManager

    - name: Ensure DEVICE
      lineinfile:
        path: "/etc/sysconfig/network-scripts/ifcfg-{{ active_if.stdout }}"
        regexp: '^DEVICE='
        line: "DEVICE={{ active_if.stdout }}"
        insertafter: EOF
      when: ifcfg_file.stat.exists
      notify: Restart NetworkManager

    - name: Ensure NAME
      lineinfile:
        path: "/etc/sysconfig/network-scripts/ifcfg-{{ active_if.stdout }}"
        regexp: '^NAME='
        line: "NAME={{ active_if.stdout }}"
        insertafter: EOF
      when: ifcfg_file.stat.exists
      notify: Restart NetworkManager

    - name: Ensure ONBOOT=yes
      lineinfile:
        path: "/etc/sysconfig/network-scripts/ifcfg-{{ active_if.stdout }}"
        regexp: '^ONBOOT='
        line: "ONBOOT=yes"
        insertafter: EOF
      when: ifcfg_file.stat.exists
      notify: Restart NetworkManager

    ###########################################################################
    # Clean DNF cache
    ###########################################################################

    - name: Clean DNF cache
      command: dnf clean all
      changed_when: false

    - name: Rebuild DNF cache
      command: dnf makecache
      changed_when: false

    ###########################################################################
    # Summary
    ###########################################################################

    - name: Display completion message
      debug:
        msg:
          - "===================================================="
          - "Leapp Preupgrade Fixes completed successfully."
          - "Active Interface : {{ active_if.stdout }}"
          - "DNF exclude filters removed."
          - "Network configuration updated."
          - "DNF cache rebuilt."
          - "Next Step:"
          - "  leapp preupgrade"
          - "===================================================="
