---
- name: Create selected hosts in Foreman from NetBox
  hosts: localhost
  connection: local
  gather_facts: false

  vars:
    netbox_url: "https://rocky-08-03.vgs.com"
    netbox_token: "83fb0cec1adff8ff4f36c9185df6b9e2f07c7fcd"

    foreman_url: "https://rocky-08-01.vgs.com"
    foreman_user: "admin"
    foreman_password: "zqs977dXzqfEvTML"

    host_root_pass: "Root@123"

    # Foreman IDs
    org_id: 1
    loc_id: 2
    hostgroup_id: 1

  tasks:

    ###########################################################################
    # Determine which hosts were selected in AWX Limit
    ###########################################################################

    - name: Get selected hosts from AWX inventory
      set_fact:
        selected_hosts: >-
          {{
            groups['all']
            | reject('equalto', 'localhost')
            | list
          }}

    - name: Show selected hosts
      debug:
        var: selected_hosts

    ###########################################################################
    # Query NetBox for each selected host
    ###########################################################################

    - name: Get device information
      uri:
        url: "{{ netbox_url }}/api/dcim/devices/?name={{ item }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: false
      loop: "{{ selected_hosts }}"
      register: device_result

    - name: Get interface information
      uri:
        url: "{{ netbox_url }}/api/dcim/interfaces/?device={{ item }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: false
      loop: "{{ selected_hosts }}"
      register: interface_result

    - name: Get IP information
      uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/?device={{ item }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: false
      loop: "{{ selected_hosts }}"
      register: ip_result

    ###########################################################################
    # Build host information
    ###########################################################################

    - name: Build host information
      set_fact:
        host_info: "{{ host_info | default([]) + [ {
          'name': item.item,
          'ip': (
            ip_result.results[loop_index].json.results
            | map(attribute='address')
            | map('regex_replace','/.*$','')
            | first
            | default('')
          ),
          'mac': (
            interface_result.results[loop_index].json.results
            | map(attribute='mac_address')
            | first
            | default('')
          )
        } ] }}"
      loop: "{{ device_result.results }}"
      loop_control:
        index_var: loop_index

    - name: Display host information
      debug:
        var: host_info

    ###########################################################################
    # Create hosts in Foreman
    ###########################################################################

    - name: Create host in Foreman
      uri:
        url: "{{ foreman_url }}/api/hosts"
        method: POST
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: true
        validate_certs: false
        status_code:
          - 200
          - 201
        headers:
          Content-Type: application/json
        body_format: json
        body:
          host:
            name: "{{ item.name }}"
            hostgroup_id: "{{ hostgroup_id }}"
            organization_id: "{{ org_id }}"
            location_id: "{{ loc_id }}"
            managed: true
            build: true
            pxe_loader: "Grub2 UEFI"
            root_pass: "{{ host_root_pass }}"
            interfaces_attributes:
              - type: interface
                mac: "{{ item.mac }}"
                ip: "{{ item.ip }}"
                primary: true
                provision: true
      loop: "{{ host_info }}"
      register: foreman_create

    - name: Show Foreman result
      debug:
        var: foreman_create
