- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"  # Fixed: Restored the required list index
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 1: PROVISION VM WITH HARD-CODED STATIC IP ---
    - name: Create VM and Enforce Static IP Binding
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            ip: "{{ target_ip }}"
            netmask: "255.255.255.0"
            gateway: "{{ nb_ctx.gateway }}"
            dns_servers: "{{ nb_ctx.dns_servers }}"
            device_type: vmxnet3
            start_connected: true
            connected: true
        customization:
          hostname: "{{ inventory_hostname.split('.')[0] }}"
          domain: "vgs.com"
          timezone: "UTC"
        wait_for_ip_address: yes
      delegate_to: localhost

    # --- PHASE 1.5: FORCED HARDWARE ALIGNMENT ---
    - name: Force vSphere Cable State and Kill Transient Dynamic Profiles
      community.vmware.vmware_guest_network:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: present
        label: "Network adapter 1"
        network_name: "{{ nb_ctx.vm_network }}"
        connected: true
        start_connected: true
        guest_control: true
      delegate_to: localhost

    - name: Wait for Boot via Targeted Static IP
      ansible.builtin.wait_for:
        host: "{{ target_ip }}"
        port: 22
        timeout: 300
        delay: 10
      delegate_to: localhost

    # --- PHASE 2: NATIVE GUEST PROFILE CONFIGURATION ---
    - name: Install and enable open-vm-tools immediately
      ansible.builtin.raw: |
        dnf install -y open-vm-tools
        systemctl enable --now vmtoolsd
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"

    - name: Enforce Strict Manual Profile Settings on Connection Manager
      ansible.builtin.raw: |
        nmcli connection modify ens33 ipv4.addresses "{{ target_ip }}/24"
        nmcli connection modify ens33 ipv4.gateway "{{ nb_ctx.gateway }}"
        nmcli connection modify ens33 ipv4.dns "{{ nb_ctx.dns_servers }}"
        nmcli connection modify ens33 ipv4.method manual
        nmcli connection modify ens33 connection.autoconnect yes
        nmcli connection modify ens33 connection.autoconnect-priority 0
        nmcli connection up ens33
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"

    - name: Reset machine-id and SSH host keys
      ansible.builtin.raw: |
        rm -f /etc/machine-id /var/lib/dbus/machine-id
        touch /etc/machine-id
        rm -f /etc/ssh/ssh_host_*
        systemd-machine-id-setup
        ssh-keygen -A
        systemctl restart sshd || systemctl restart ssh
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"
      when: inventory_hostname not in ['://vgs.com', 'localhost']
