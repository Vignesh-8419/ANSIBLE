---
- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 2: PROVISION WITH FORCED CUSTOMIZATION ENGINE ---
    - name: Create VM in vCenter with Static IP Assignment
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        
        # Inject network definitions natively into vCenter without triggering the validation block
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            ip: "{{ target_ip }}"
            netmask: "255.255.255.0"   # Explicitly using standard subnet string for vCenter native spec
            gateway: "{{ nb_ctx.gateway }}"
            dns_servers: "{{ nb_ctx.dns_servers }}"
            start_connected: true
            connected: true

        # Forces vCenter to run the customization engine on first boot even if tools status reports missing
        customization:
          existing_customization_spec: null
          hostname: "{{ inventory_hostname.split('.')[0] }}"
          domain: "vgs.com"

        # Ansible will wait directly for 192.168.253.151 to wake up over network interface
        wait_for_ip_address: yes
      delegate_to: localhost

    # --- PHASE 3: GUEST CONFIGURATION ---
    # Ansible connects directly to the static IP (.151) configured natively during cloning
    - name: Guest Configuration Block
      block:

        - name: Install open-vm-tools to prevent future infrastructure errors
          ansible.builtin.raw: |
            sudo dnf install -y open-vm-tools
            sudo systemctl enable --now vmtoolsd
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"

        - name: Reset machine-id and SSH host keys
          ansible.builtin.raw: |
            sudo rm -f /etc/machine-id /var/lib/dbus/machine-id
            sudo touch /etc/machine-id
            sudo rm -f /etc/ssh/ssh_host_*
            sudo systemd-machine-id-setup
            sudo ssh-keygen -A
            sudo systemctl restart sshd || sudo systemctl restart ssh
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"
          when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
