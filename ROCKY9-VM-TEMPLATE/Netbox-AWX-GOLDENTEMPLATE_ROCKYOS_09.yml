---
- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        # Extracting the dictionary out of the list index
        nb_ctx: "{{ config_context[0] if config_context is not string and config_context | length > 0 else config_context }}"
      when: config_context is defined

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 2: VCENTER PROVISIONING ---
    - name: Create VM in vCenter
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            start_connected: true
        wait_for_ip_address: yes
      register: vm_create
      delegate_to: localhost

    # --- NEW STEP: Route Ansible to the temporary DHCP IP ---
    - name: Set temporary connection target to DHCP IP
      set_fact:
        ansible_host: "{{ vm_create.instance.ipv4 }}"
      when: vm_create.instance.ipv4 is defined

    # --- PHASE 3: GUEST CONFIGURATION ---
    - name: Guest Configuration Block
      block:

        - name: Install open-vm-tools to prevent future customization errors
          ansible.builtin.raw: |
            sudo dnf install -y open-vm-tools
            sudo systemctl enable --now vmtoolsd
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"

        - name: Reset machine-id and SSH host keys
          ansible.builtin.raw: |
            sudo rm -f /etc/machine-id /var/lib/dbus/machine-id
            sudo touch /etc/machine-id
            sudo rm -f /etc/ssh/ssh_host_*
            sudo systemd-machine-id-setup
            sudo ssh-keygen -A
            sudo systemctl restart sshd || sudo systemctl restart ssh
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"
          when: inventory_hostname not in ['://vgs.com', 'localhost']

        - name: Apply permanent static IP and DNS profile
          ansible.builtin.raw: |
            sudo hostnamectl set-hostname {{ inventory_hostname }}
            
            # Find active connection interface name (e.g., ens192)
            DEVICE=$(ip route | awk '/default/ {print $5; exit}')
            ACTIVE_UUID=$(nmcli -t -f UUID,DEVICE connection show --active | awk -F: -v dev="$DEVICE" '$2==dev {print $1}')
            
            # Change network profile from DHCP to manual static mapping using NetBox data
            sudo nmcli connection modify "$ACTIVE_UUID" ipv4.addresses "{{ target_hosts }}/24"
            sudo nmcli connection modify "$ACTIVE_UUID" ipv4.gateway "{{ nb_ctx.gateway }}"
            sudo nmcli connection modify "$ACTIVE_UUID" ipv4.dns "{{ nb_ctx.dns_servers | join(' ') }}"
            sudo nmcli connection modify "$ACTIVE_UUID" ipv4.method manual
            sudo nmcli connection modify "$ACTIVE_UUID" ipv4.ignore-auto-dns yes
            
            # Apply changes asynchronously to avoid SSH disconnection hang
            nohup sh -c "sudo nmcli connection up '$ACTIVE_UUID'" > /dev/null 2>&1 &
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"

    # --- NEW STEP: Restore Ansible targeting to your intended static host IP ---
    - name: Reset host pointer back to static IP mapping
      set_fact:
        ansible_host: "{{ target_hosts }}"
