- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 1: PROVISION VM (WITHOUT BROKEN CUSTOMIZATION) ---
    - name: Create VM from Template
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            device_type: vmxnet3
            start_connected: true
            connected: true
        wait_for_ip_address: yes
      delegate_to: localhost
      register: vm_facts

    # --- PHASE 2: GUEST IP OVERRIDE MANAGEMENT ---
    - name: Extract Bootstrap Runtime IP
      set_fact:
        bootstrap_ip: "{{ vm_facts.instance.ipv4 }}"

    - name: Wait for SSH to accept keys on Bootstrap IP
      ansible.builtin.wait_for:
        host: "{{ bootstrap_ip }}"
        port: 22
        timeout: 300
        delay: 10
      delegate_to: localhost

    - name: Set Hostname Natively inside Guest OS
      ansible.builtin.raw: |
        hostnamectl set-hostname "{{ inventory_hostname.split('.')[0] }}"
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"
        ansible_host: "{{ bootstrap_ip }}"

    - name: Kill DHCP and Enforce Static IP Only on Connection Profile
      ansible.builtin.raw: |
        {% raw %}
        # Locate active ethernet interface safely escaping shell variables from Jinja
        IFACE=$(nmcli -t -f DEVICE,TYPE device status | awk -F: '$2=="ethernet"{print $1; exit}')
        {% endraw %}
        
        # Modify the interface directly to drop DHCP and bind your static IP exclusively
        nmcli connection modify "$IFACE" ipv4.addresses "{{ target_ip }}/24"
        nmcli connection modify "$IFACE" ipv4.gateway "{{ nb_ctx.gateway }}"
        nmcli connection modify "$IFACE" ipv4.dns "{{ nb_ctx.dns_servers }}"
        nmcli connection modify "$IFACE" ipv4.method manual
        nmcli connection modify "$IFACE" connection.autoconnect yes
        nmcli connection modify "$IFACE" connection.autoconnect-priority 0
        
        # Reload interface in background so it doesn't freeze the Ansible task
        (sleep 2 && nmcli connection up "$IFACE") &
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"
        ansible_host: "{{ bootstrap_ip }}"

    # --- PHASE 3: CONFIRM FINAL STATIC IP LINK ---
    - name: Verify VM responds exclusively on target static IP
      ansible.builtin.wait_for:
        host: "{{ target_ip }}"
        port: 22
        timeout: 90
        delay: 5
      delegate_to: localhost

    - name: Install and enable open-vm-tools
      ansible.builtin.raw: |
        dnf install -y open-vm-tools
        systemctl enable --now vmtoolsd
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"
        ansible_host: "{{ target_ip }}"

    - name: Reset machine-id and SSH host keys
      ansible.builtin.raw: |
        rm -f /etc/machine-id /var/lib/dbus/machine-id
        touch /etc/machine-id
        rm -f /etc/ssh/ssh_host_*
        systemd-machine-id-setup
        ssh-keygen -A
        systemctl restart sshd || systemctl restart ssh
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"
        ansible_host: "{{ target_ip }}"
      when: inventory_hostname not in ['://vgs.com', 'localhost']
