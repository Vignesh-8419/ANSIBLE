---
- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        # Extract the dictionary container natively from index 0 of the NetBox array
        nb_ctx: "{{ config_context[0] }}"
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 2: VCENTER PROVISIONING ---
    - name: Create VM in vCenter (Injecting Network Parameters via OVF)
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            start_connected: true
        
        # Bypasses vCenter OS customization to avoid open-vm-tools validation crash
        vapp_properties:
          - id: "guestinfo.ipaddr"
            value: "{{ target_ip }}"
            type: "string"
          - id: "guestinfo.netmask"
            value: "{{ nb_ctx.netmask | default('24') }}"
            type: "string"
          - id: "guestinfo.gateway"
            value: "{{ nb_ctx.gateway }}"
            type: "string"
          - id: "guestinfo.dns"
            value: "{{ nb_ctx.dns_servers | join(' ') }}"
            type: "string"
            
        # Ansible will wait patiently for the final static IP to wake up and respond
        wait_for_ip_address: yes
      delegate_to: localhost

    # --- PHASE 3: GUEST CONFIGURATION ---
    # Ansible connects directly to the newly self-configured static IP (.151)
    - name: Guest Configuration Block
      block:

        - name: Reset machine-id and SSH host keys
          ansible.builtin.raw: |
            sudo rm -f /etc/machine-id
            sudo rm -f /var/lib/dbus/machine-id
            sudo touch /etc/machine-id

            sudo rm -f /etc/ssh/ssh_host_*

            # Generate new machine-id
            sudo systemd-machine-id-setup

            # Generate new SSH host keys
            sudo ssh-keygen -A

            # Restart SSH
            sudo systemctl restart sshd || sudo systemctl restart ssh
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"
          when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']

        - name: Set Hostname and Network inside Guest
          ansible.builtin.raw: |
            sudo hostnamectl set-hostname {{ inventory_hostname }}

            # Detect active NetworkManager connection
            CONN_NAME=$(nmcli -t -f NAME,DEVICE connection show --active | awk -F: '$2 != "" {print $1; exit}')

            # Detect active network interface
            IFACE=$(nmcli -t -f DEVICE connection show --active | head -n1)

            echo "Connection: $CONN_NAME"
            echo "Interface : $IFACE"

            sudo nmcli connection modify "$CONN_NAME" ipv4.dns "{{ nb_ctx.dns_servers | join(' ') }}"
            sudo nmcli connection modify "$CONN_NAME" ipv4.ignore-auto-dns yes
            sudo nmcli connection up "$CONN_NAME"
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"
          when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
