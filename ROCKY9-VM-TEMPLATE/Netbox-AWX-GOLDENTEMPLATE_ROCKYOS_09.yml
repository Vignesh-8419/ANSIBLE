---
- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 2: VCENTER PROVISIONING ---
    - name: Create VM in vCenter (Bypassing OS Specs)
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            start_connected: true
        wait_for_ip_address: no # Do not wait for a random DHCP IP
      delegate_to: localhost

    - name: Allow 15 seconds for VM Boot initialization
      ansible.builtin.pause:
        seconds: 15

    # --- NEW: Inject Static IP directly through vCenter API (No SSH Required) ---
    - name: Push Static IP Configuration using Guest API
      community.vmware.vmware_vm_shell:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        vm_id: "{{ inventory_hostname.split('.')[0] }}"
        # Credentials to authenticate directly inside the Guest OS layer
        vm_username: "{{ nb_ctx.vm_admin_user }}"
        vm_password: "{{ nb_ctx.vm_admin_password }}"
        vm_shell: "/bin/bash"
        vm_shell_args: >
          -c "sudo hostnamectl set-hostname {{ inventory_hostname }} &&
          ACTIVE_CONN=\$(nmcli -t -f NAME,DEVICE connection show --active | awk -F: '\$2!=\"\" {print \$1; exit}') &&
          sudo nmcli connection modify \"\$ACTIVE_CONN\" ipv4.addresses \"{{ target_ip }}/{{ nb_ctx.netmask | default('24') }}\" &&
          sudo nmcli connection modify \"\$ACTIVE_CONN\" ipv4.gateway \"{{ nb_ctx.gateway }}\" &&
          sudo nmcli connection modify \"\$ACTIVE_CONN\" ipv4.dns \"{{ nb_ctx.dns_servers | join(' ') }}\" &&
          sudo nmcli connection modify \"\$ACTIVE_CONN\" ipv4.method manual &&
          sudo nmcli connection modify \"\$ACTIVE_CONN\" ipv4.ignore-auto-dns yes &&
          sudo nmcli connection up \"\$ACTIVE_CONN\""
      delegate_to: localhost

    - name: Wait for Static IP to answer on SSH
      ansible.builtin.wait_for:
        host: "{{ target_ip }}"
        port: 22
        timeout: 60
      delegate_to: localhost

    # --- PHASE 3: GUEST CONFIGURATION ---
    # Connects straight to 192.168.253.151 over standard SSH transport
    - name: Guest Configuration Block
      block:

        - name: Install open-vm-tools to prevent future infrastructure errors
          ansible.builtin.raw: |
            sudo dnf install -y open-vm-tools
            sudo systemctl enable --now vmtoolsd
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"

        - name: Reset machine-id and SSH host keys
          ansible.builtin.raw: |
            sudo rm -f /etc/machine-id /var/lib/dbus/machine-id
            sudo touch /etc/machine-id
            sudo rm -f /etc/ssh/ssh_host_*
            sudo systemd-machine-id-setup
            sudo ssh-keygen -A
            sudo systemctl restart sshd || sudo systemctl restart ssh
          vars:
            ansible_user: "{{ nb_ctx.vm_admin_user }}"
            ansible_password: "{{ nb_ctx.vm_admin_password }}"
          when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
