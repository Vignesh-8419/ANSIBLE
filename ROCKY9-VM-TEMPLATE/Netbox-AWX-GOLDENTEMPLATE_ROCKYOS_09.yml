- name: End-to-End VM Provisioning and Configuration
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: no
  become_method: sudo
  become_user: root
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 1: PROVISION VM WITHOUT BROKEN CUSTOMIZATION ENGINE ---
    - name: Create VM from Template
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rocky9_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            device_type: vmxnet3
            start_connected: true
            connected: true
        wait_for_ip_address: yes
      delegate_to: localhost

    - name: Wait for Boot via Interface
      ansible.builtin.wait_for:
        host: "{{ target_ip }}"
        port: 22
        timeout: 300
        delay: 10
      delegate_to: localhost

    # --- PHASE 2: NATIVE GUEST PROFILE CONFIGURATION ---
    
    - name: Install and enable open-vm-tools immediately
      ansible.builtin.raw: |
        dnf install -y open-vm-tools
        systemctl enable --now vmtoolsd
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"

    - name: Set Hostname via NetworkManager
      ansible.builtin.raw: |
        hostnamectl set-hostname "{{ inventory_hostname.split('.')[0] }}"
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"

    - name: Apply Static IP and Network Profile to NetworkManager
      ansible.builtin.raw: |
        IFACE=$(nmcli -t -f DEVICE,TYPE device status | awk -F: '$2=="ethernet"{print $1; exit}')
        CONN=$(nmcli -t -f NAME,DEVICE connection show --active | awk -F: -v dev="$IFACE" '$2==dev{print $1; exit}')
        
        if [ -n "$CONN" ]; then
            nmcli connection modify "$CONN" ipv4.addresses "{{ target_ip }}/24"
            nmcli connection modify "$CONN" ipv4.gateway "{{ nb_ctx.gateway }}"
            nmcli connection modify "$CONN" ipv4.dns "{{ nb_ctx.dns_servers }}"
            nmcli connection modify "$CONN" ipv4.method manual
            nmcli connection modify "$CONN" connection.autoconnect yes
            nmcli connection up "$CONN"
        fi
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"

    - name: Reset machine-id and SSH host keys
      ansible.builtin.raw: |
        rm -f /etc/machine-id /var/lib/dbus/machine-id
        touch /etc/machine-id
        rm -f /etc/ssh/ssh_host_*
        systemd-machine-id-setup
        ssh-keygen -A
        systemctl restart sshd || systemctl restart ssh
      vars:
        ansible_user: "{{ nb_ctx.vm_admin_user }}"
        ansible_password: "{{ nb_ctx.vm_admin_password }}"
      when: inventory_hostname not in ['://vgs.com', 'localhost']
