---
- name: Validate EL7 Host
  hosts: all
  become: yes
  gather_facts: no

  vars:
    ansible_python_interpreter: /usr/bin/python3

  tasks:

    - name: Give server time to begin reboot
      delegate_to: localhost
      become: false
      pause:
        seconds: 60

    - name: Wait For SSH
      wait_for_connection:
        timeout: 900
        sleep: 10

    - name: Running Kernel
      raw: uname -r
      register: kernel_out
      changed_when: false

    - name: Latest Installed Kernel
      raw: rpm -q kernel --last | head -1
      register: latest_kernel
      changed_when: false

    - name: Uptime
      raw: uptime
      register: uptime_out
      changed_when: false

    - name: Show Validation Results
      debug:
        msg:
          - "Running Kernel  : {{ kernel_out.stdout }}"
          - "Installed Kernel: {{ latest_kernel.stdout }}"
          - "Uptime          : {{ uptime_out.stdout }}"
