---
- name: Validate EL7 Host
  hosts: all
  become: yes
  gather_facts: no

  tasks:

    - name: Wait for SSH
      wait_for_connection:
        timeout: 900

    - name: Display Hostname
      raw: hostname
      register: hostname_out
      changed_when: false

    - name: Display Running Kernel
      raw: uname -r
      register: kernel_out
      changed_when: false

    - name: Display Uptime
      raw: uptime
      register: uptime_out
      changed_when: false

    - name: Display Latest Installed Kernel
      raw: rpm -q kernel --last | head -1
      register: latest_kernel
      changed_when: false

    - name: Show Validation Results
      debug:
        msg:
          - "Hostname       : {{ hostname_out.stdout }}"
          - "Running Kernel : {{ kernel_out.stdout }}"
          - "Installed Kernel: {{ latest_kernel.stdout }}"
          - "Uptime         : {{ uptime_out.stdout }}"
