---
- name: Offline Infrastructure Patching Orchestrator EL7
  hosts: all
  become: yes
  gather_facts: no
  any_errors_fatal: false

  pre_tasks:

    - name: Load NetBox Context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"

    - name: Build Repository Variables
      set_fact:
        repo_url: "{{ nb_ctx.httpd_server_url | regex_replace('/$','') }}"
        base_repo: "{{ (nb_ctx.repositories | selectattr('id','equalto','base') | first).folder }}"
        patch_repo: "{{ (nb_ctx.repositories | selectattr('id','equalto','patch') | first).folder }}"

    - name: Display NetBox Context
      debug:
        msg:
          - "Repository URL : {{ repo_url }}"
          - "Base Repo      : {{ base_repo }}"
          - "Patch Repo     : {{ patch_repo }}"

  tasks:

    - name: Verify DNS Resolution
      raw: |
        getent hosts {{ repo_url | regex_replace('^https?://','') | regex_replace('/.*$','') }}
      register: dns_check
      changed_when: false
      failed_when: dns_check.rc != 0

    - name: Verify Base Repository Metadata
      raw: |
        curl -sf {{ repo_url }}/{{ base_repo }}/repodata/repomd.xml >/dev/null
      register: base_repo_check
      changed_when: false
      failed_when: base_repo_check.rc != 0

    - name: Verify Patch Repository Metadata
      raw: |
        curl -sf {{ repo_url }}/{{ patch_repo }}/repodata/repomd.xml >/dev/null
      register: patch_repo_check
      changed_when: false
      failed_when: patch_repo_check.rc != 0

    - name: Capture Current Kernel Version
      raw: uname -r
      register: kernel_before
      changed_when: false

    - name: Execute Offline Patching
      raw: |
        BACKUP_DIR=/etc/yum.repos.d/backup_repos_original

        mkdir -p ${BACKUP_DIR}

        mv /etc/yum.repos.d/*.repo ${BACKUP_DIR}/ 2>/dev/null || true

        cat > /etc/yum.repos.d/base.repo <<EOF
        [base]
        name=CentOS/RHEL7 Base Repository
        baseurl={{ repo_url }}/{{ base_repo }}
        enabled=1
        gpgcheck=0
        EOF

        cat > /etc/yum.repos.d/patch.repo <<EOF
        [patch]
        name=CentOS/RHEL7 Patch Repository
        baseurl={{ repo_url }}/{{ patch_repo }}
        enabled=1
        gpgcheck=0
        EOF

        yum clean all

        yum makecache \
          --disablerepo='*' \
          --enablerepo=base,patch

        yum update -y \
          --skip-broken \
          --setopt=obsoletes=0 \
          --disablerepo='*' \
          --enablerepo=base,patch

        PATCH_RC=$?

        rm -f /etc/yum.repos.d/base.repo
        rm -f /etc/yum.repos.d/patch.repo

        if [ -d "${BACKUP_DIR}" ]; then
          mv ${BACKUP_DIR}/*.repo /etc/yum.repos.d/ 2>/dev/null || true
          rmdir ${BACKUP_DIR} 2>/dev/null || true
        fi

        yum clean all

        exit ${PATCH_RC}
      register: patch_output

    - name: Display Patch Output
      debug:
        var: patch_output.stdout_lines

    - name: Check Installed Kernel Package
      raw: rpm -q kernel --last | head -1 | awk '{print $1}'
      register: latest_kernel
      changed_when: false

    - name: Capture Running Kernel
      raw: uname -r
      register: running_kernel
      changed_when: false

    - name: Show Kernel Status
      debug:
        msg:
          - "Running Kernel : {{ running_kernel.stdout }}"
          - "Latest Kernel  : {{ latest_kernel.stdout }}"

	- name: Reboot Host If Required
	raw: |
		nohup bash -c "sleep 5; shutdown -r now" >/dev/null 2>&1 &
	when: running_kernel.stdout not in latest_kernel.stdout
	ignore_errors: true
	
	- name: Wait 30 Seconds For Reboot To Start
	delegate_to: localhost
	become: false
	pause:
		seconds: 30
	
	- name: Wait For SSH To Return
	delegate_to: localhost
	become: false
	wait_for:
		host: "{{ ansible_host | default(inventory_hostname) }}"
		port: 22
		state: started
		timeout: 1200
	
	- meta: reset_connection
	
	- name: Wait For SSH Connectivity
	wait_for_connection:
		timeout: 600

    - name: Pause For Services To Settle
      become: false
      delegate_to: localhost
      pause:
        seconds: 30

    - name: Capture New Kernel Version
      raw: uname -r
      register: kernel_after
      changed_when: false

    - name: Display Kernel Comparison
      debug:
        msg:
          - "Kernel Before : {{ kernel_before.stdout }}"
          - "Kernel After  : {{ kernel_after.stdout }}"

    - name: Verify Host Uptime
      raw: uptime
      register: uptime_output
      changed_when: false

    - name: Display Uptime
      debug:
        var: uptime_output.stdout

    - name: Verify Current Running Kernel
      raw: |
        echo "Running Kernel : $(uname -r)"
        echo "Latest Kernel  : $(rpm -q kernel | sort | tail -1)"
      register: kernel_validation
      changed_when: false

    - name: Display Kernel Validation
      debug:
        var: kernel_validation.stdout_lines
