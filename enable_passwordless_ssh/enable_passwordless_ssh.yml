---
- name: Configure passwordless SSH
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: true
  gather_facts: false

  vars:
    ssh_private_key: files/id_rsa
    ssh_public_key: files/id_rsa.pub

  tasks:

    - name: Ensure /root/.ssh exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Copy private key
      copy:
        src: "{{ ssh_private_key }}"
        dest: /root/.ssh/id_rsa
        owner: root
        group: root
        mode: '0600'

    - name: Copy public key
      copy:
        src: "{{ ssh_public_key }}"
        dest: /root/.ssh/id_rsa.pub
        owner: root
        group: root
        mode: '0644'

    - name: Install authorized key
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', ssh_public_key) }}"

    - name: Set SELinux context
      command: restorecon -Rv /root/.ssh
      changed_when: false
      failed_when: false

    - name: Verify key login
      shell: |
        ssh -o BatchMode=yes \
            -o StrictHostKeyChecking=no \
            localhost hostname
      register: ssh_test
      changed_when: false
      failed_when: false

    - debug:
        var: ssh_test.stdout
