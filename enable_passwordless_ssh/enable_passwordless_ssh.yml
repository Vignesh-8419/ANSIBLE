---
- name: Enable Passwordless SSH
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: yes
  gather_facts: false

  tasks:

    - name: Ensure root .ssh exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    - name: Install SSH public key
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', 'files/authorized_key.pub') }}"

    - name: Fix permissions
      file:
        path: /root/.ssh/authorized_keys
        owner: root
        group: root
        mode: '0600'
