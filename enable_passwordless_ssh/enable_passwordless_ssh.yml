---
- name: Enable Passwordless SSH using Public Key
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: true
  gather_facts: false

  vars:
    ssh_public_key_file: "files/authorized_key.pub"

  tasks:

    - name: Ensure root .ssh directory exists
      ansible.builtin.file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Install SSH public key for root
      ansible.builtin.authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', ssh_public_key_file) }}"
        manage_dir: false

    - name: Set permissions on authorized_keys
      ansible.builtin.file:
        path: /root/.ssh/authorized_keys
        state: file
        owner: root
        group: root
        mode: "0600"

    - name: Verify authorized_keys exists
      ansible.builtin.stat:
        path: /root/.ssh/authorized_keys
      register: auth_key

    - name: Display status
      ansible.builtin.debug:
        msg:
          - "Passwordless SSH configured successfully."
          - "Host: {{ inventory_hostname }}"
          - "authorized_keys present: {{ auth_key.stat.exists }}"
