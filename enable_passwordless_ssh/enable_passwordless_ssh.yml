---
- name: Configure Root Passwordless SSH
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: true
  gather_facts: false

  vars:
    shared_private_key: "files/id_rsa"
    master_public_key: "files/authorized_key.pub"

  tasks:

    - name: Ensure /root/.ssh exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: "0700"

    - name: Copy shared private key
      copy:
        src: "{{ shared_private_key }}"
        dest: /root/.ssh/id_rsa
        owner: root
        group: root
        mode: "0600"
        force: yes

    - name: Copy master public key
      copy:
        src: "{{ master_public_key }}"
        dest: /root/.ssh/id_rsa.pub
        owner: root
        group: root
        mode: "0644"
        force: yes

    - name: Install master public key into authorized_keys
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', master_public_key) }}"
        manage_dir: false

    - name: Configure SSH client
      copy:
        dest: /root/.ssh/config
        owner: root
        group: root
        mode: "0600"
        content: |
          Host *
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              LogLevel ERROR

    - name: Set private key permissions
      file:
        path: /root/.ssh/id_rsa
        owner: root
        group: root
        mode: "0600"

    - name: Set public key permissions
      file:
        path: /root/.ssh/id_rsa.pub
        owner: root
        group: root
        mode: "0644"

    - name: Set authorized_keys permissions
      file:
        path: /root/.ssh/authorized_keys
        owner: root
        group: root
        mode: "0600"

    - name: Restore SELinux context
      command: restorecon -Rv /root/.ssh
      changed_when: false
      failed_when: false

    - name: Verify private key exists
      stat:
        path: /root/.ssh/id_rsa
      register: private_key

    - name: Verify public key exists
      stat:
        path: /root/.ssh/id_rsa.pub
      register: public_key

    - name: Verify authorized_keys exists
      stat:
        path: /root/.ssh/authorized_keys
      register: auth

    - name: Test localhost passwordless SSH
      shell: ssh -o BatchMode=yes -o ConnectTimeout=5 localhost "hostname"
      register: ssh_test
      changed_when: false
      failed_when: false

    - name: Display Result
      debug:
        msg:
          - "===================================================="
          - "Root Passwordless SSH Configuration Completed"
          - "Host              : {{ inventory_hostname }}"
          - "Private Key       : {{ private_key.stat.exists }}"
          - "Public Key        : {{ public_key.stat.exists }}"
          - "authorized_keys   : {{ auth.stat.exists }}"
          - "SSH Test          : {{ ssh_test.stdout | default('FAILED') }}"
          - "===================================================="
