---
- name: Configure Passwordless SSH (Windows + Server-to-Server)
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: true
  gather_facts: false

  vars:
    windows_public_key_file: "files/authorized_key.pub"

  tasks:

    ####################################################################
    # Ensure .ssh exists
    ####################################################################

    - name: Ensure root .ssh directory exists
      file:
        path: /root/.ssh
        state: directory
        owner: root
        group: root
        mode: '0700'

    ####################################################################
    # Install Windows (PuTTY) public key
    ####################################################################

    - name: Install Windows public key
      authorized_key:
        user: root
        state: present
        key: "{{ lookup('file', windows_public_key_file) }}"
        manage_dir: false

    ####################################################################
    # Generate Linux SSH key if missing
    ####################################################################

    - name: Check if server SSH key exists
      stat:
        path: /root/.ssh/id_rsa
      register: ssh_key

    - name: Generate SSH keypair
      command: ssh-keygen -q -t rsa -b 4096 -N "" -f /root/.ssh/id_rsa
      when: not ssh_key.stat.exists

    ####################################################################
    # Read server public key
    ####################################################################

    - name: Read server public key
      slurp:
        src: /root/.ssh/id_rsa.pub
      register: server_pubkey

    ####################################################################
    # Install every server's own public key
    ####################################################################

    - name: Install server public key
      authorized_key:
        user: root
        state: present
        key: "{{ server_pubkey.content | b64decode }}"

    ####################################################################
    # Permissions
    ####################################################################

    - name: Fix .ssh permissions
      file:
        path: /root/.ssh
        owner: root
        group: root
        mode: '0700'

    - name: Fix authorized_keys permissions
      file:
        path: /root/.ssh/authorized_keys
        owner: root
        group: root
        mode: '0600'

    ####################################################################
    # Status
    ####################################################################

    - name: Display status
      debug:
        msg:
          - "Passwordless SSH configured."
          - "Windows -> {{ inventory_hostname }} : OK"
          - "Server key exists : {{ ssh_key.stat.exists | default(false) }}"
