---
- name: Create DNS records in Technitium DNS
  hosts: all
  gather_facts: false

  vars:
    dns_server: "192.168.253.1:5380"
    dns_token: "14759e1e000567381175d02ef3e137d2847e6dd637e5a74bcdb726e24dabaac7"

  tasks:

    - name: Determine target IP
      set_fact:
        target_ip: >-
          {{
            primary_ip4.address.split('/')[0]
            if (primary_ip4 is mapping and primary_ip4.address is defined)
            else primary_ip4
          }}

    - name: Validate required variables
      assert:
        that:
          - inventory_hostname is defined
          - target_ip is defined
        fail_msg: "inventory_hostname and target_ip must be available"

    - name: Extract hostname and DNS details
      set_fact:
        short_hostname: "{{ inventory_hostname.split('.')[0] }}"
        dns_zone: "{{ inventory_hostname.split('.', 1)[1] }}"
        reverse_zone: "{{ target_ip.split('.')[2] }}.{{ target_ip.split('.')[1] }}.{{ target_ip.split('.')[0] }}.in-addr.arpa"
        last_octet: "{{ target_ip.split('.')[-1] }}"

    - name: Display calculated values
      debug:
        msg:
          - "FQDN          : {{ inventory_hostname }}"
          - "Hostname      : {{ short_hostname }}"
          - "DNS Zone      : {{ dns_zone }}"
          - "IP Address    : {{ target_ip }}"
          - "Reverse Zone  : {{ reverse_zone }}"
          - "PTR Record    : {{ last_octet }}"

    - name: Show A Record URL
      debug:
        msg: "http://{{ dns_server }}/api/zones/records/add?token={{ dns_token }}&zone={{ dns_zone }}&domain={{ inventory_hostname }}&type=A&ttl=3600&ipAddress={{ target_ip }}&ptr=false&createPtrZone=false&updateSvcbHints=false"

    - name: Create A Record
      delegate_to: localhost
      uri:
        url: "http://{{ dns_server }}/api/zones/records/add?token={{ dns_token }}&zone={{ dns_zone }}&domain={{ inventory_hostname }}&type=A&ttl=3600&ipAddress={{ target_ip }}&ptr=false&createPtrZone=false&updateSvcbHints=false"
        method: GET
        return_content: true
        status_code: 200
      register: a_record_result

    - name: Show A Record response
      debug:
        var: a_record_result.json

    - name: Show PTR Record URL
      debug:
        msg: "http://{{ dns_server }}/api/zones/records/add?token={{ dns_token }}&zone={{ reverse_zone }}&domain={{ last_octet }}.{{ reverse_zone }}&type=PTR&ttl=3600&ptrName={{ inventory_hostname }}"

    - name: Create PTR Record
      delegate_to: localhost
      uri:
        url: "http://{{ dns_server }}/api/zones/records/add?token={{ dns_token }}&zone={{ reverse_zone }}&domain={{ last_octet }}.{{ reverse_zone }}&type=PTR&ttl=3600&ptrName={{ inventory_hostname }}"
        method: GET
        return_content: true
        status_code: 200
      register: ptr_record_result

    - name: Show PTR Record response
      debug:
        var: ptr_record_result.json

    - name: Verify Forward DNS
      delegate_to: localhost
      command: "nslookup {{ inventory_hostname }} {{ dns_server }}"
      register: forward_lookup
      changed_when: false
      failed_when: false

    - name: Show Forward DNS Result
      debug:
        var: forward_lookup.stdout_lines

    - name: Verify Reverse DNS
      delegate_to: localhost
      command: "nslookup {{ target_ip }} {{ dns_server }}"
      register: reverse_lookup
      changed_when: false
      failed_when: false

    - name: Show Reverse DNS Result
      debug:
        var: reverse_lookup.stdout_lines
