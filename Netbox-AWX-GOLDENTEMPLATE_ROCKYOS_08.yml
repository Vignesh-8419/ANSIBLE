---
- name: End-to-End VM Provisioning and Configuration
  hosts: all
  gather_facts: no
  vars:
    ansible_ssh_common_args: '-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null'

  tasks:
    # --- PHASE 0: PREPARE DATA ---
    - name: Load and normalize NetBox config context
      set_fact:
        # Use the first index since your debug showed it's a list
        nb_ctx: "{{ config_context[0] }}"
      when: config_context is defined and config_context | length > 0

    - name: Map Target IP
      set_fact:
        target_ip: "{{ ansible_host }}"

    # --- PHASE 1: DNS REGISTRATION ---
    - name: Execute Pi-hole script on DNS Server
      ansible.builtin.shell: "/root/pihole-customdns.sh --add {{ inventory_hostname }} {{ target_ip }}"
      delegate_to: 192.168.253.151 
      become: yes
      vars:
        # Explicitly pull nb_ctx from the current host's facts
        ansible_user: "{{ hostvars[inventory_hostname]['nb_ctx']['infra_dns_user'] }}"
        ansible_ssh_pass: "{{ hostvars[inventory_hostname]['nb_ctx']['infra_dns_pass'] }}"
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']

    # --- PHASE 2: VCENTER PROVISIONING ---
    - name: Create VM in vCenter
      community.vmware.vmware_guest:
        hostname: "{{ nb_ctx.vcenter_hostname }}"
        username: "{{ nb_ctx.vcenter_username }}"
        password: "{{ nb_ctx.vcenter_password }}"
        validate_certs: false
        datacenter: "{{ nb_ctx.datacenter_name }}"
        folder: "/{{ nb_ctx.datacenter_name }}/{{ nb_ctx.folder | default('vm') }}"
        name: "{{ inventory_hostname.split('.')[0] }}"
        state: poweredon
        template: "{{ nb_ctx.rockyos_template_name }}"
        networks:
          - name: "{{ nb_ctx.vm_network }}"
            ip: "{{ target_ip }}"
            netmask: "{{ nb_ctx.netmask }}"
            gateway: "{{ nb_ctx.gateway }}"
            dns_servers: "{{ nb_ctx.dns_servers }}"
            start_connected: true
        wait_for_ip_address: yes
      delegate_to: localhost
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']

    # --- PHASE 3: GUEST CONFIGURATION ---
    - name: Phase 3 - Force guest connection variables
      set_fact:
        ansible_host: "{{ target_ip }}"
        ansible_user: "{{ nb_ctx.vm_root_user }}"
        ansible_ssh_pass: "{{ nb_ctx.vm_root_password }}"
        ansible_connection: ssh
        ansible_ssh_transfer_method: scp
        ansible_shell_type: sh
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Show connection details
      debug:
        msg:
          - "inventory_hostname={{ inventory_hostname }}"
          - "ansible_host={{ ansible_host }}"
          - "ansible_user={{ ansible_user }}"
          - "target_ip={{ target_ip }}"
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Wait for SSH port 22 from AWX EE
      ansible.builtin.wait_for:
        host: "{{ target_ip }}"
        port: 22
        delay: 10
        timeout: 300
        state: started
      delegate_to: localhost
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Check if Python3 exists
      ansible.builtin.raw: which python3
      register: python_check
      ignore_errors: yes
      changed_when: false
      retries: 5
      delay: 5
      until: python_check.stdout != ""
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Install Python3 if missing
      ansible.builtin.raw: dnf -y install python3.9
      become: yes
      when:
        - inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
        - python_check.rc != 0
      register: python_install
    
    - name: Set ansible_python_interpreter fact
      set_fact:
        ansible_python_interpreter: /usr/bin/python3
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Test raw access
      ansible.builtin.raw: |
        whoami
        python3 --version
      register: raw_result
      changed_when: false
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Show raw bootstrap result
      debug:
        var: raw_result
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Gather minimal facts after Python is ready
      ansible.builtin.setup:
        gather_subset:
          - min
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
    
    - name: Set Hostname and Network inside Guest
      ansible.builtin.shell: |
        hostnamectl set-hostname {{ inventory_hostname }}
        OLD_NAME=$(nmcli -t -f NAME connection show --active | head -n 1)
        nmcli connection modify "$OLD_NAME" ipv4.dns "{{ nb_ctx.dns_servers | join(' ') }}"
        nmcli connection modify "$OLD_NAME" ipv4.ignore-auto-dns yes
        nmcli connection up "$OLD_NAME"
      become: yes
      when: inventory_hostname not in ['dns-server-01.vgs.com', 'localhost']
