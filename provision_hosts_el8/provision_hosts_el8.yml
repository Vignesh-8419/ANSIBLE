---
- name: Prepare and create Rocky 8 hosts in Foreman using API
  hosts: localhost
  connection: local
  gather_facts: no

  collections:
    - community.vmware

  vars:
    netbox_url: "https://rocky-08-03.vgs.com"
    netbox_token: "83fb0cec1adff8ff4f36c9185df6b9e2f07c7fcd"

    foreman_url: "https://rocky-08-01.vgs.com"
    foreman_user: "admin"
    foreman_password: "zqs977dXzqfEvTML"

    host_root_pass: "Root@123"

    cluster_name: "rocky-8-servers"

    # Leave empty to create all Rocky hosts
    target_servers: "{{ target_hosts.split(',') | map('trim') | list }}"

    # Foreman IDs
    # Foreman IDs
    org_id: 1
    loc_id: 2
    hostgroup_id: 2

  tasks:

    ###########################################################################
    # Get devices from NetBox
    ###########################################################################

    - name: Get devices from NetBox cluster
      uri:
        url: "{{ netbox_url }}/api/dcim/devices/?cluster={{ cluster_name }}"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: no
      register: netbox_devices

    - name: Show devices returned by NetBox
      debug:
        msg: "{{ netbox_devices.json.results | map(attribute='name') | list }}"

    ###########################################################################
    # Filter selected hosts
    ###########################################################################

    - name: Initialize filtered device list
      set_fact:
        filtered_devices: []

    - name: Filter devices by hostname
      set_fact:
        filtered_devices: "{{ filtered_devices + [item] }}"
      loop: "{{ netbox_devices.json.results }}"
      when:
        - item.name.split('.')[0] in target_servers

    - name: Show filtered devices
      debug:
        var: filtered_devices

    - name: Fail if no hosts matched
      fail:
        msg: "No matching hosts found in NetBox."
      when: filtered_devices | length == 0


    ###########################################################################
    # Get VM information from ESXi
    ###########################################################################

    - name: Get VM information from ESXi
      community.vmware.vmware_guest_info:
        hostname: "192.168.253.128"
        username: "root"
        password: "Root@123"
        validate_certs: false
        name: "{{ item.name.split('.')[0] }}"
      loop: "{{ filtered_devices }}"
      register: vm_info

    ###########################################################################
    # Get IP addresses
    ###########################################################################
    
    - name: Get IP addresses from NetBox
      uri:
        url: "{{ netbox_url }}/api/ipam/ip-addresses/"
        method: GET
        headers:
          Authorization: "Token {{ netbox_token }}"
        validate_certs: no
      register: netbox_ips

    - name: Initialize host info
      set_fact:
        host_info: []
    
    - name: Build host info
      set_fact:
        host_info: "{{ host_info + [ {
          'name': item.0.name,
          'ip': (
            netbox_ips.json.results
            | selectattr('assigned_object.device.name','equalto',item.0.name)
            | map(attribute='address')
            | map('regex_replace','/.*$','')
            | first
            | default('')
          ),
          'mac': (
            item.1.instance.hw_eth0.macaddress
            | default('')
          )
        } ] }}"
      loop: "{{ filtered_devices | zip(vm_info.results) | list }}"

    - debug:
        var: host_info

    ###########################################################################
    # Check if host already exists in Foreman
    ###########################################################################

    - name: Check if host exists in Foreman
      uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: yes
        validate_certs: no
        status_code:
          - 200
          - 404
      loop: "{{ host_info }}"
      register: foreman_hosts

    ###########################################################################
    # Create hosts in Foreman
    ###########################################################################

    - name: Create host in Foreman (only if missing)
      uri:
        url: "{{ foreman_url }}/api/hosts"
        method: POST
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: yes
        validate_certs: no
        status_code:
          - 200
          - 201
        headers:
          Content-Type: application/json
        body_format: json
        body:
          host:
            name: "{{ item.item.name }}"
            hostgroup_id: "{{ hostgroup_id }}"
            organization_id: "{{ org_id }}"
            location_id: "{{ loc_id }}"
            managed: true
            build: true
            pxe_loader: "Grub2 UEFI"
            root_pass: "{{ host_root_pass }}"
            interfaces_attributes:
              - type: interface
                mac: "{{ item.item.mac }}"
                ip: "{{ item.item.ip }}"
                primary: true
                provision: true
      when: item.status == 404
      loop: "{{ foreman_hosts.results }}"
      register: foreman_create

    - name: Refresh Foreman host information
      uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.name }}"
        method: GET
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: yes
        validate_certs: no
        status_code: 200
      loop: "{{ host_info }}"
      register: foreman_hosts_updated

    - name: Show refreshed Foreman hosts
      debug:
        msg:
          - "Host: {{ item.json.name }}"
          - "ID: {{ item.json.id }}"
      loop: "{{ foreman_hosts_updated.results }}"
        
    - name: Enable build mode for existing hosts only
      uri:
        url: "{{ foreman_url }}/api/hosts/{{ item.json.id }}"
        method: PUT
        user: "{{ foreman_user }}"
        password: "{{ foreman_password }}"
        force_basic_auth: yes
        validate_certs: no
        headers:
          Content-Type: application/json
        body_format: json
        body:
          host:
            build: true
        status_code:
          - 200
      when: item.json.build == false
      loop: "{{ foreman_hosts_updated.results }}"

    - debug:
        var: foreman_create
