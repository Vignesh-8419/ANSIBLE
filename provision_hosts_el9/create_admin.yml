---
- name: Create Shared Admin User
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: yes
  become_method: sudo
  become_user: root
  gather_facts: yes
  any_errors_fatal: false

  vars:
    admin_user: admin

    # Password: Vigneshv12$
    admin_password: "$6$TDxrkjdWRZRu8eto$Qjtyu8XXyDsNB7jAjIiw9Yr17KT/m58VDLpi.CIXEPjKf9s8kq2oIciKUvq1dG935191IyRs5tHB9ClrnOl53/"

    shared_private_key: "files/id_rsa"
    master_public_key: "files/authorized_key.pub"

  tasks:

    - name: Ensure wheel group exists
      group:
        name: wheel
        state: present

    - name: Create admin user
      user:
        name: "{{ admin_user }}"
        comment: Shared Lab Administrator
        shell: /bin/bash
        create_home: yes
        groups: wheel
        append: yes
        password: "{{ admin_password }}"
        state: present

    - name: Create .ssh directory
      file:
        path: "/home/{{ admin_user }}/.ssh"
        state: directory
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0700"

    - name: Copy shared private key
      copy:
        src: "{{ shared_private_key }}"
        dest: "/home/{{ admin_user }}/.ssh/id_rsa"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"

    - name: Copy master public key
      copy:
        src: "{{ master_public_key }}"
        dest: "/home/{{ admin_user }}/.ssh/id_rsa.pub"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0644"

    - name: Install master public key
      authorized_key:
        user: "{{ admin_user }}"
        state: present
        key: "{{ lookup('file', master_public_key) }}"

    - name: Configure SSH client
      copy:
        dest: "/home/{{ admin_user }}/.ssh/config"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        mode: "0600"
        content: |
          Host *
              IdentityFile ~/.ssh/id_rsa
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
              LogLevel ERROR

    - name: Enable passwordless sudo
      copy:
        dest: /etc/sudoers.d/admin
        owner: root
        group: root
        mode: "0440"
        content: |
          admin ALL=(ALL) NOPASSWD: ALL
        validate: "/usr/sbin/visudo -cf %s"

    - name: Restore SELinux context
      command: restorecon -Rv /home/{{ admin_user }}/.ssh
      changed_when: false
      failed_when: false

    - name: Ensure SSH ownership
      file:
        path: "/home/{{ admin_user }}/.ssh"
        owner: "{{ admin_user }}"
        group: "{{ admin_user }}"
        recurse: yes

    - name: Verify admin user
      command: id {{ admin_user }}
      register: admin_result
      changed_when: false

    - name: Verify SSH private key
      stat:
        path: "/home/{{ admin_user }}/.ssh/id_rsa"
      register: private_key

    - name: Verify authorized_keys
      stat:
        path: "/home/{{ admin_user }}/.ssh/authorized_keys"
      register: auth

    - name: Verify sudo
      become: yes
      become_user: "{{ admin_user }}"
      command: sudo -n whoami
      register: sudo_result
      changed_when: false

    - name: Test localhost SSH
      become: yes
      become_user: "{{ admin_user }}"
      shell: ssh -o BatchMode=yes -o ConnectTimeout=5 localhost "hostname"
      register: ssh_test
      changed_when: false
      failed_when: false

    - name: Display Summary
      debug:
        msg:
          - "===================================================="
          - "Admin User Configuration Completed"
          - "Host              : {{ inventory_hostname }}"
          - "Admin User        : {{ admin_result.stdout }}"
          - "Sudo              : {{ sudo_result.stdout }}"
          - "Private Key       : {{ private_key.stat.exists }}"
          - "authorized_keys   : {{ auth.stat.exists }}"
          - "SSH Test          : {{ ssh_test.stdout | default('FAILED') }}"
          - "===================================================="
