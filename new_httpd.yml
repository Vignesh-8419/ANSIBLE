```yaml
---
# ============================================================================
# Play 1: Bootstrap Python 3.9
# ============================================================================

- name: Bootstrap Python 3.9 on Rocky 8
  hosts: all
  become: yes
  gather_facts: no

  tasks:
    - name: Install Python 3.9 if not present
      raw: |
        if ! command -v python3.9 >/dev/null 2>&1; then
          dnf install -y python39
        fi

    - name: Reset SSH connection
      meta: reset_connection


# ============================================================================
# Play 2: Configure Rocky 8 HTTPS Repo Server
# ============================================================================

- name: Rocky 8 Repo Server → HTTPS + HTTP to HTTPS Redirect
  hosts: all
  become: yes
  gather_facts: yes

  vars:
    ansible_python_interpreter: /usr/bin/python3.9

    fqdn: "http-server-01.vgs.com"
    ssl_key: "/etc/pki/tls/private/pvt.pem"
    ssl_cert: "/etc/pki/tls/certs/crt.pem"

  tasks:

    ##########################################################################
    # Install Packages
    ##########################################################################

    - name: Install required packages
      raw: |
        dnf install -y \
          httpd \
          mod_ssl \
          createrepo \
          firewalld \
          openssl \
          cifs-utils
      changed_when: false


    ##########################################################################
    # Repository Mount
    ##########################################################################

    - name: Create repository directory
      file:
        path: /var/www/html/repo
        state: directory
        mode: '0777'

    - name: Mount CIFS share
      mount:
        path: /var/www/html/repo
        src: //192.168.31.87/ISO
        fstype: cifs
        opts: "username=vigne,password=Vigneshv12$,rw,dir_mode=0777,file_mode=0777,vers=3.0"
        state: mounted


    ##########################################################################
    # Firewalld
    ##########################################################################

    - name: Configure firewalld
      raw: |
        systemctl enable --now firewalld

        firewall-cmd --permanent --query-service=http \
          || firewall-cmd --permanent --add-service=http

        firewall-cmd --permanent --query-service=https \
          || firewall-cmd --permanent --add-service=https

        firewall-cmd --reload
      changed_when: false


    ##########################################################################
    # Apache Access Configuration
    ##########################################################################

    - name: Allow access to /var/www/html
      blockinfile:
        path: /etc/httpd/conf/httpd.conf
        marker: "# {mark} ANSIBLE MANAGED BLOCK - /var/www/html access"
        block: |
          <Directory "/var/www/html">
              Options Indexes FollowSymLinks
              AllowOverride None
              Require all granted
          </Directory>
      notify: restart httpd


    ##########################################################################
    # SSL Certificate
    ##########################################################################

    - name: Generate private key
      command: openssl genrsa -out {{ ssl_key }} 2048
      args:
        creates: "{{ ssl_key }}"

    - name: Generate self-signed certificate
      command: >
        openssl req -new -x509 -days 365
        -key {{ ssl_key }}
        -out {{ ssl_cert }}
        -subj "/C=IN/ST=Tamil Nadu/L=Chennai/O=VGS.COM/OU=VGS.COM/CN={{ fqdn }}"
      args:
        creates: "{{ ssl_cert }}"

    - name: Secure private key permissions
      file:
        path: "{{ ssl_key }}"
        mode: '0600'


    ##########################################################################
    # SSL Virtual Host
    ##########################################################################

    - name: Configure SSL VirtualHost
      blockinfile:
        path: /etc/httpd/conf.d/ssl.conf
        insertafter: "^<VirtualHost.*443>"
        marker: "# {mark} ANSIBLE MANAGED SSL CONFIG"
        block: |
          ServerName {{ fqdn }}
          SSLEngine on
          SSLCertificateFile {{ ssl_cert }}
          SSLCertificateKeyFile {{ ssl_key }}
      notify: restart httpd


    ##########################################################################
    # HTTP → HTTPS Redirect
    ##########################################################################

    - name: Configure HTTP to HTTPS redirect
      copy:
        dest: /etc/httpd/conf.d/ssl-redirect.conf
        mode: '0644'
        content: |
          <VirtualHost *:80>
              ServerName {{ fqdn }}
              Redirect permanent / https://{{ fqdn }}/
          </VirtualHost>
      notify: restart httpd


    ##########################################################################
    # Apache
    ##########################################################################

    - name: Start and enable Apache
      service:
        name: httpd
        state: started
        enabled: yes

    - name: Apply pending Apache changes
      meta: flush_handlers

    - name: Verify Apache configuration
      command: apachectl configtest
      register: apache_test
      changed_when: false


    ##########################################################################
    # Validation
    ##########################################################################

    - name: Test HTTP → HTTPS redirect
      uri:
        url: "http://192.168.253.136"
        follow_redirects: none
        validate_certs: no
      register: redirect_test
      delegate_to: localhost
      ignore_errors: true

    - name: Confirm redirect works
      assert:
        that:
          - redirect_test.status == 301
          - redirect_test.location is defined
          - "'https://' in redirect_test.location"
        success_msg: >
          SUCCESS → HTTP redirects to HTTPS
          ({{ redirect_test.location }})
        fail_msg: >
          FAILED → HTTP redirect is not working


  handlers:
    - name: restart httpd
      service:
        name: httpd
        state: restarted
```
