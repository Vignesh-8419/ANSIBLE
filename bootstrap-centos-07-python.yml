- name: Bootstrap CentOS 7 for Ansible + Python3
  hosts: all
  become: true
  gather_facts: false

  tasks:

    - name: Mount ISO share
      raw: |
        mkdir -p /var/www/html/repo
        if ! mountpoint -q /var/www/html/repo; then
          mount -t cifs //192.168.31.87/ISO /var/www/html/repo \
            -o username=vigne,password='Vigneshv12$',rw,dir_mode=0777,file_mode=0777,vers=3.0
        fi

    - name: Clean YUM repos
      raw: rm -f /etc/yum.repos.d/*.repo

    - name: Create base repo
      raw: |
        cat > /etc/yum.repos.d/base.repo <<EOF
        [baseos]
        name=CentOS Base Repo
        baseurl=file:///var/www/html/repo/centos
        enabled=1
        gpgcheck=0
        EOF

    - name: Create patch repo
      raw: |
        cat > /etc/yum.repos.d/patch.repo <<EOF
        [patch]
        name=CentOS Patch Repo
        baseurl=file:///var/www/html/repo/installed_rhel7
        enabled=1
        gpgcheck=0
        EOF

    - name: Install Python 3
      raw: |
        yum clean all
        yum install -y python3

    - name: Install sshpass
      raw: yum install -y sshpass

    - name: Verify python
      raw: python3 --version
