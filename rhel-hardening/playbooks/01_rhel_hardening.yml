---
- name: Enterprise Linux Hardening
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: yes
  become_method: sudo
  become_user: root
  gather_facts: yes
  any_errors_fatal: false

  vars:

    ssh_port: 22
    admin_user: admin

    permit_root_login: "no"
    password_authentication: "yes"
    pubkey_authentication: "yes"

    login_grace_time: "60"
    max_auth_tries: "3"
    max_sessions: "10"

    client_alive_interval: "300"
    client_alive_countmax: "0"

    pass_max_days: 90
    pass_min_days: 1
    pass_warn_age: 7

    backup_dir: "/root/hardening_backup"

  pre_tasks:

    - name: Verify Supported OS
      fail:
        msg: "Only RHEL/CentOS/Rocky 7/8/9 supported."
      when:
        - ansible_distribution not in ['RedHat','CentOS','Rocky']
        - ansible_distribution_major_version not in ['7','8','9']

    - name: Create Backup Directory
      file:
        path: "{{ backup_dir }}"
        state: directory
        mode: '0700'

    - name: Backup sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: "{{ backup_dir }}/sshd_config"
        remote_src: yes

    - name: Backup login.defs
      copy:
        src: /etc/login.defs
        dest: "{{ backup_dir }}/login.defs"
        remote_src: yes

  tasks:

###########################################################################
# SSH HARDENING
###########################################################################

    - name: Disable Root Login
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitRootLogin'
        line: "PermitRootLogin {{ permit_root_login }}"
      notify: restart sshd

    - name: Enable Pubkey Authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PubkeyAuthentication'
        line: "PubkeyAuthentication {{ pubkey_authentication }}"
      notify: restart sshd

    - name: Password Authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PasswordAuthentication'
        line: "PasswordAuthentication {{ password_authentication }}"
      notify: restart sshd

    - name: Disable Empty Passwords
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?PermitEmptyPasswords'
        line: "PermitEmptyPasswords no"
      notify: restart sshd

    - name: Disable X11 Forwarding
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?X11Forwarding'
        line: "X11Forwarding no"
      notify: restart sshd

    - name: Disable GSSAPI Authentication
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?GSSAPIAuthentication'
        line: "GSSAPIAuthentication no"
      notify: restart sshd

    - name: Disable DNS Lookup
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?UseDNS'
        line: "UseDNS no"
      notify: restart sshd

    - name: Configure Login Grace Time
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?LoginGraceTime'
        line: "LoginGraceTime {{ login_grace_time }}"
      notify: restart sshd

    - name: Configure MaxAuthTries
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxAuthTries'
        line: "MaxAuthTries {{ max_auth_tries }}"
      notify: restart sshd

    - name: Configure MaxSessions
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?MaxSessions'
        line: "MaxSessions {{ max_sessions }}"
      notify: restart sshd

    - name: Configure Idle Timeout
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveInterval'
        line: "ClientAliveInterval {{ client_alive_interval }}"
      notify: restart sshd

    - name: Configure Idle Count
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: '^#?ClientAliveCountMax'
        line: "ClientAliveCountMax {{ client_alive_countmax }}"
      notify: restart sshd

###########################################################################
# PASSWORD POLICY
###########################################################################

    - name: PASS_MAX_DAYS
      replace:
        path: /etc/login.defs
        regexp: '^PASS_MAX_DAYS.*'
        replace: "PASS_MAX_DAYS {{ pass_max_days }}"

    - name: PASS_MIN_DAYS
      replace:
        path: /etc/login.defs
        regexp: '^PASS_MIN_DAYS.*'
        replace: "PASS_MIN_DAYS {{ pass_min_days }}"

    - name: PASS_WARN_AGE
      replace:
        path: /etc/login.defs
        regexp: '^PASS_WARN_AGE.*'
        replace: "PASS_WARN_AGE {{ pass_warn_age }}"

###########################################################################
# SUDO
###########################################################################

    - name: Ensure wheel group exists
      group:
        name: wheel
        state: present

    - name: Ensure admin user exists
      user:
        name: "{{ admin_user }}"
        groups: wheel
        append: yes

    - name: Configure passwordless sudo
      copy:
        dest: /etc/sudoers.d/admin
        mode: '0440'
        content: |
          admin ALL=(ALL) NOPASSWD: ALL
        validate: '/usr/sbin/visudo -cf %s'

###########################################################################
# LOGIN BANNER
###########################################################################

    - name: Configure /etc/issue
      copy:
        dest: /etc/issue
        content: |

          ************************************************************
                     Authorized Access Only

           All activities are monitored and recorded.

          ************************************************************

    - name: Configure /etc/issue.net
      copy:
        dest: /etc/issue.net
        content: |

          ************************************************************
                     Authorized Access Only

           All activities are monitored and recorded.

          ************************************************************

###########################################################################
# SUMMARY
###########################################################################

    - name: Summary
      debug:
        msg:
          - "SSH Hardening Applied"
          - "Password Policy Configured"
          - "Sudo Configured"
          - "Banner Configured"

  handlers:

    - name: restart sshd
      service:
        name: sshd
        state: restarted

###########################################################################
# PAM / FAILLOCK
###########################################################################

- name: Install required security packages
  package:
    name:
      - authselect
      - pam
      - libpwquality
      - audit
    state: present
  ignore_errors: yes

- name: Configure faillock (EL8/EL9)
  lineinfile:
    path: /etc/security/faillock.conf
    regexp: "^deny"
    line: "deny = 5"
    create: yes
  when: ansible_distribution_major_version in ['8','9']

- name: Configure unlock time
  lineinfile:
    path: /etc/security/faillock.conf
    regexp: "^unlock_time"
    line: "unlock_time = 900"
    create: yes
  when: ansible_distribution_major_version in ['8','9']

- name: Configure fail interval
  lineinfile:
    path: /etc/security/faillock.conf
    regexp: "^fail_interval"
    line: "fail_interval = 900"
    create: yes
  when: ansible_distribution_major_version in ['8','9']

###########################################################################
# PASSWORD QUALITY
###########################################################################

- name: Configure minimum password length
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^minlen"
    line: "minlen = 12"
    create: yes

- name: Require uppercase
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^ucredit"
    line: "ucredit = -1"
    create: yes

- name: Require lowercase
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^lcredit"
    line: "lcredit = -1"
    create: yes

- name: Require digit
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^dcredit"
    line: "dcredit = -1"
    create: yes

- name: Require special character
  lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "^ocredit"
    line: "ocredit = -1"
    create: yes

###########################################################################
# AUDITD
###########################################################################

- name: Install auditd
  package:
    name: audit
    state: present

- name: Enable auditd
  service:
    name: auditd
    enabled: yes
    state: started

###########################################################################
# JOURNALD
###########################################################################

- name: Enable persistent logging
  lineinfile:
    path: /etc/systemd/journald.conf
    regexp: "^Storage"
    line: "Storage=persistent"
  notify: restart journald

###########################################################################
# KERNEL HARDENING
###########################################################################

- name: Disable IP Forwarding
  sysctl:
    name: net.ipv4.ip_forward
    value: '0'
    reload: yes

- name: Disable Source Route
  sysctl:
    name: net.ipv4.conf.all.accept_source_route
    value: '0'
    reload: yes

- name: Disable Source Route Default
  sysctl:
    name: net.ipv4.conf.default.accept_source_route
    value: '0'
    reload: yes

- name: Disable ICMP Redirects
  sysctl:
    name: net.ipv4.conf.all.accept_redirects
    value: '0'
    reload: yes

- name: Disable Secure Redirects
  sysctl:
    name: net.ipv4.conf.all.secure_redirects
    value: '0'
    reload: yes

- name: Disable Send Redirects
  sysctl:
    name: net.ipv4.conf.all.send_redirects
    value: '0'
    reload: yes

- name: Ignore Bogus ICMP
  sysctl:
    name: net.ipv4.icmp_ignore_bogus_error_responses
    value: '1'
    reload: yes

- name: Enable SYN Cookies
  sysctl:
    name: net.ipv4.tcp_syncookies
    value: '1'
    reload: yes

- name: Enable Reverse Path Filtering
  sysctl:
    name: net.ipv4.conf.all.rp_filter
    value: '1'
    reload: yes

- name: Enable ASLR
  sysctl:
    name: kernel.randomize_va_space
    value: '2'
    reload: yes

###########################################################################
# CORE DUMPS
###########################################################################

- name: Disable core dumps
  copy:
    dest: /etc/security/limits.d/99-hardening.conf
    content: |
      * hard core 0
      * soft core 0

###########################################################################
# SECURITY LIMITS
###########################################################################

- name: Disable Ctrl-Alt-Del reboot
  service:
    name: ctrl-alt-del.target
    masked: yes
  ignore_errors: yes

###########################################################################
# VERIFY SERVICES
###########################################################################

- name: Ensure rsyslog running
  service:
    name: rsyslog
    enabled: yes
    state: started
  ignore_errors: yes

- name: Ensure chronyd running
  service:
    name: chronyd
    enabled: yes
    state: started
  ignore_errors: yes

###########################################################################
# HANDLERS
###########################################################################

handlers:

- name: restart journald
  service:
    name: systemd-journald
    state: restarted

###########################################################################
# FIREWALL
###########################################################################

- name: Install firewalld
  package:
    name: firewalld
    state: present
  ignore_errors: yes

- name: Enable firewalld
  service:
    name: firewalld
    enabled: yes
    state: started
  ignore_errors: yes

- name: Allow SSH
  firewalld:
    service: ssh
    permanent: yes
    state: enabled
    immediate: yes
  ignore_errors: yes

- name: Allow HTTP
  firewalld:
    service: http
    permanent: yes
    state: enabled
    immediate: yes
  ignore_errors: yes

- name: Allow HTTPS
  firewalld:
    service: https
    permanent: yes
    state: enabled
    immediate: yes
  ignore_errors: yes

###########################################################################
# DISABLE INSECURE SERVICES
###########################################################################

- name: Disable telnet
  service:
    name: telnet.socket
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Disable xinetd
  service:
    name: xinetd
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Disable rsh
  service:
    name: rsh.socket
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Disable rexec
  service:
    name: rexec.socket
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Disable ypbind
  service:
    name: ypbind
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Disable cups
  service:
    name: cups
    enabled: no
    state: stopped
  ignore_errors: yes

- name: Disable avahi
  service:
    name: avahi-daemon
    enabled: no
    state: stopped
  ignore_errors: yes

###########################################################################
# CRON HARDENING
###########################################################################

- name: Secure cron files
  file:
    path: "{{ item }}"
    owner: root
    group: root
    mode: "0600"
  loop:
    - /etc/crontab
    - /etc/cron.allow
    - /etc/at.allow
  ignore_errors: yes

- name: Remove cron.deny
  file:
    path: /etc/cron.deny
    state: absent

- name: Remove at.deny
  file:
    path: /etc/at.deny
    state: absent

###########################################################################
# HOME DIRECTORY SECURITY
###########################################################################

- name: Secure /home permissions
  file:
    path: /home
    owner: root
    group: root
    mode: "0755"

- name: Secure admin home
  file:
    path: /home/admin
    owner: admin
    group: admin
    mode: "0750"

###########################################################################
# WORLD WRITABLE FILES
###########################################################################

- name: Find world writable files
  shell: |
    find / -xdev -type f -perm -0002
  register: world_files
  changed_when: false

- name: Remove world writable bit
  file:
    path: "{{ item }}"
    mode: "o-w"
  loop: "{{ world_files.stdout_lines }}"
  ignore_errors: yes

###########################################################################
# STICKY BIT
###########################################################################

- name: Find world writable directories
  shell: |
    find / -xdev -type d -perm -0002
  register: world_dirs
  changed_when: false

- name: Set sticky bit
  file:
    path: "{{ item }}"
    mode: "1777"
  loop: "{{ world_dirs.stdout_lines }}"
  ignore_errors: yes

###########################################################################
# TMP SECURITY
###########################################################################

- name: Secure /tmp
  file:
    path: /tmp
    owner: root
    group: root
    mode: "1777"

###########################################################################
# SU RESTRICTION
###########################################################################

- name: Restrict su to wheel group
  lineinfile:
    path: /etc/pam.d/su
    regexp: '^#auth.*pam_wheel.so'
    line: 'auth required pam_wheel.so use_uid'

###########################################################################
# DEFAULT UMASK
###########################################################################

- name: Configure login.defs UMASK
  replace:
    path: /etc/login.defs
    regexp: '^UMASK.*'
    replace: 'UMASK 027'

- name: Configure bashrc umask
  lineinfile:
    path: /etc/bashrc
    regexp: '^umask'
    line: 'umask 027'

###########################################################################
# FILE PERMISSIONS
###########################################################################

- name: Secure passwd
  file:
    path: /etc/passwd
    owner: root
    group: root
    mode: "0644"

- name: Secure shadow
  file:
    path: /etc/shadow
    owner: root
    group: root
    mode: "0000"

- name: Secure group
  file:
    path: /etc/group
    owner: root
    group: root
    mode: "0644"

- name: Secure gshadow
  file:
    path: /etc/gshadow
    owner: root
    group: root
    mode: "0000"

###########################################################################
# VERIFY SELINUX
###########################################################################

- name: Check SELinux Status
  command: getenforce
  register: selinux_status
  changed_when: false
  failed_when: false

###########################################################################
# COMPLIANCE SUMMARY
###########################################################################

- name: Compliance Summary
  debug:
    msg:
      - "======================================================="
      - "Enterprise Hardening Completed"
      - "Host              : {{ inventory_hostname }}"
      - "Operating System  : {{ ansible_distribution }} {{ ansible_distribution_version }}"
      - "SELinux           : {{ selinux_status.stdout }}"
      - "Firewall          : Configured"
      - "Audit             : Enabled"
      - "SSH               : Hardened"
      - "Password Policy   : Configured"
      - "PAM               : Configured"
      - "Kernel            : Hardened"
      - "Filesystem        : Secured"
      - "Sudo              : Configured"
      - "======================================================="
