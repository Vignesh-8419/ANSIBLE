---
- name: Enterprise Linux Hardening Rollback
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  gather_facts: yes

  become: yes
  become_method: sudo
  become_user: root

  vars:

    backup_dir: /root/hardening_backup

  tasks:

###########################################################################
# VERIFY BACKUP
###########################################################################

    - name: Check backup directory
      stat:
        path: "{{ backup_dir }}"
      register: backup

    - name: Abort if backup missing
      fail:
        msg: "Backup directory {{ backup_dir }} not found."
      when: not backup.stat.exists

###########################################################################
# SSH
###########################################################################

    - name: Restore sshd_config
      copy:
        src: "{{ backup_dir }}/sshd_config"
        dest: /etc/ssh/sshd_config
        remote_src: yes
        owner: root
        group: root
        mode: '0600'
      ignore_errors: yes
      notify: restart sshd

###########################################################################
# LOGIN.DEFS
###########################################################################

    - name: Restore login.defs
      copy:
        src: "{{ backup_dir }}/login.defs"
        dest: /etc/login.defs
        remote_src: yes
      ignore_errors: yes

###########################################################################
# PASSWORD QUALITY
###########################################################################

    - name: Restore pwquality.conf
      copy:
        src: "{{ backup_dir }}/pwquality.conf"
        dest: /etc/security/pwquality.conf
        remote_src: yes
      ignore_errors: yes

###########################################################################
# FAILLOCK
###########################################################################

    - name: Restore faillock.conf
      copy:
        src: "{{ backup_dir }}/faillock.conf"
        dest: /etc/security/faillock.conf
        remote_src: yes
      ignore_errors: yes

###########################################################################
# LIMITS
###########################################################################

    - name: Remove hardening limits
      file:
        path: /etc/security/limits.d/99-hardening.conf
        state: absent

###########################################################################
# SUDO
###########################################################################

    - name: Remove sudo hardening
      file:
        path: /etc/sudoers.d/admin
        state: absent

###########################################################################
# LOGIN BANNER
###########################################################################

    - name: Restore issue
      copy:
        src: "{{ backup_dir }}/issue"
        dest: /etc/issue
        remote_src: yes
      ignore_errors: yes

    - name: Restore issue.net
      copy:
        src: "{{ backup_dir }}/issue.net"
        dest: /etc/issue.net
        remote_src: yes
      ignore_errors: yes

###########################################################################
# SYSCTL
###########################################################################

    - name: Restore sysctl.conf
      copy:
        src: "{{ backup_dir }}/sysctl.conf"
        dest: /etc/sysctl.conf
        remote_src: yes
      ignore_errors: yes
      notify: reload sysctl

###########################################################################
# AUDITD
###########################################################################

    - name: Restore audit rules
      copy:
        src: "{{ backup_dir }}/audit.rules"
        dest: /etc/audit/rules.d/hardening.rules
        remote_src: yes
      ignore_errors: yes
      notify: restart auditd

    - name: Remove immutable audit rules
      shell: auditctl -e 0
      ignore_errors: yes
      changed_when: false

###########################################################################
# JOURNALD
###########################################################################

    - name: Restore journald.conf
      copy:
        src: "{{ backup_dir }}/journald.conf"
        dest: /etc/systemd/journald.conf
        remote_src: yes
      ignore_errors: yes
      notify: restart journald

###########################################################################
# FIREWALL
###########################################################################

    - name: Restore firewalld configuration
      copy:
        src: "{{ backup_dir }}/firewalld"
        dest: /etc/firewalld
        remote_src: yes
      ignore_errors: yes
      notify: restart firewalld

###########################################################################
# PAM
###########################################################################

    - name: Restore system-auth
      copy:
        src: "{{ backup_dir }}/system-auth"
        dest: /etc/pam.d/system-auth
        remote_src: yes
      ignore_errors: yes

    - name: Restore password-auth
      copy:
        src: "{{ backup_dir }}/password-auth"
        dest: /etc/pam.d/password-auth
        remote_src: yes
      ignore_errors: yes

###########################################################################
# AUTHSELECT (EL8/EL9)
###########################################################################

    - name: Restore authselect profile
      shell: authselect apply-changes
      when: ansible_distribution_major_version in ['8','9']
      ignore_errors: yes

###########################################################################
# CRON
###########################################################################

    - name: Restore crontab
      copy:
        src: "{{ backup_dir }}/crontab"
        dest: /etc/crontab
        remote_src: yes
      ignore_errors: yes

    - name: Restore cron.allow
      copy:
        src: "{{ backup_dir }}/cron.allow"
        dest: /etc/cron.allow
        remote_src: yes
      ignore_errors: yes

    - name: Restore at.allow
      copy:
        src: "{{ backup_dir }}/at.allow"
        dest: /etc/at.allow
        remote_src: yes
      ignore_errors: yes

###########################################################################
# SSH CONFIG
###########################################################################

    - name: Remove hardening SSH config
      file:
        path: /root/.ssh/config
        state: absent
      ignore_errors: yes

###########################################################################
# REMOVE LIMITS
###########################################################################

    - name: Remove limits.d hardening file
      file:
        path: /etc/security/limits.d/99-hardening.conf
        state: absent

###########################################################################
# HANDLERS
###########################################################################

  handlers:

    - name: restart sshd
      service:
        name: sshd
        state: restarted

    - name: restart auditd
      service:
        name: auditd
        state: restarted

    - name: restart journald
      service:
        name: systemd-journald
        state: restarted

    - name: restart firewalld
      service:
        name: firewalld
        state: restarted
      ignore_errors: yes

    - name: reload sysctl
      command: sysctl --system
###########################################################################
# RESTORE FILE PERMISSIONS
###########################################################################

    - name: Restore /etc/passwd permissions
      file:
        path: /etc/passwd
        owner: root
        group: root
        mode: "0644"

    - name: Restore /etc/group permissions
      file:
        path: /etc/group
        owner: root
        group: root
        mode: "0644"

    - name: Restore /etc/shadow permissions
      file:
        path: /etc/shadow
        owner: root
        group: root
        mode: "0000"

    - name: Restore /etc/gshadow permissions
      file:
        path: /etc/gshadow
        owner: root
        group: root
        mode: "0000"

###########################################################################
# REMOVE HARDENING FILES
###########################################################################

    - name: Remove login banner
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /etc/issue
        - /etc/issue.net
      ignore_errors: yes

###########################################################################
# RESTORE SERVICES
###########################################################################

    - name: Enable chronyd
      service:
        name: chronyd
        enabled: yes
        state: started
      ignore_errors: yes

    - name: Enable rsyslog
      service:
        name: rsyslog
        enabled: yes
        state: started
      ignore_errors: yes

###########################################################################
# SSH VALIDATION
###########################################################################

    - name: Validate sshd configuration
      command: sshd -t
      register: sshd_test
      changed_when: false
      failed_when: false

###########################################################################
# SYSCTL VALIDATION
###########################################################################

    - name: Reload sysctl
      command: sysctl --system
      changed_when: false
      failed_when: false

###########################################################################
# SELINUX
###########################################################################

    - name: Get SELinux status
      command: getenforce
      register: selinux_status
      changed_when: false
      failed_when: false

###########################################################################
# FIREWALL STATUS
###########################################################################

    - name: Get firewalld status
      command: systemctl is-active firewalld
      register: firewalld_status
      changed_when: false
      failed_when: false

###########################################################################
# AUDIT STATUS
###########################################################################

    - name: Get auditd status
      command: systemctl is-active auditd
      register: audit_status
      changed_when: false
      failed_when: false

###########################################################################
# CLEANUP BACKUP (OPTIONAL)
###########################################################################

    - name: Remove backup directory
      file:
        path: "{{ backup_dir }}"
        state: absent
      when: remove_backup | default(false)

###########################################################################
# REBOOT CHECK
###########################################################################

    - name: Check if reboot is recommended
      stat:
        path: /var/run/reboot-required
      register: reboot_required
      failed_when: false

###########################################################################
# SUMMARY
###########################################################################

    - name: Rollback Summary
      debug:
        msg:
          - "========================================================"
          - " Enterprise Linux Rollback Completed"
          - "========================================================"
          - "Host               : {{ inventory_hostname }}"
          - "Operating System   : {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "SSHD Config        : {{ 'OK' if sshd_test.rc == 0 else 'FAILED' }}"
          - "SELinux            : {{ selinux_status.stdout | default('Unknown') }}"
          - "Auditd             : {{ audit_status.stdout | default('Unknown') }}"
          - "Firewalld          : {{ firewalld_status.stdout | default('Unknown') }}"
          - "Backup Removed     : {{ remove_backup | default(false) }}"
          - "Reboot Recommended : {{ reboot_required.stat.exists | default(false) }}"
          - "========================================================"

###########################################################################
# OPTIONAL REBOOT
###########################################################################

    - name: Reboot after rollback (optional)
      reboot:
        reboot_timeout: 900
        msg: "System rebooting after rollback."
      when:
        - reboot_after_rollback | default(false)
