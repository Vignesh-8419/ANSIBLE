- name: Run Foreman setup script from GitHub
  hosts: all
  become: true
  gather_facts: false
  vars:
      ansible_python_interpreter: /usr/bin/python3
  tasks:

    - name: Download Foreman_Rocky.sh from GitHub to remote host
      get_url:
        url: "https://raw.githubusercontent.com/Vignesh-8419/ANSIBLE/main/Foreman_Rocky.sh"
        dest: "/tmp/Foreman_Rocky.sh"
        mode: '0755'

    - name: Ensure log file exists
      file:
        path: /tmp/foreman_log.txt
        state: touch
        mode: '0644'

    - name: Execute Foreman_Rocky.sh on remote host
      shell: /tmp/Foreman_Rocky.sh > /tmp/foreman_log.txt 2>&1
      register: foreman_run

    - name: Print Foreman setup log
      command: cat /tmp/foreman_log.txt
      register: foreman_log

    - name: Show log contents
      debug:
        var: foreman_log.stdout_lines
