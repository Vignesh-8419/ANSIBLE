---
- name: Offline Infrastructure Patching Orchestrator
  hosts: all
  become: yes
  gather_facts: no
  any_errors_fatal: false

  vars:

    ctx: "{{ config_context[0] }}"

    backup_dir_name: "backup_repos_original"

    repo_url: "{{ ctx.httpd_server_url | regex_replace('/$','') }}"

    default_gw: "{{ ctx.gateway }}"

    rocky8_baseos: >-
      {{
        (ctx.repositories
        | selectattr('id','equalto','rocky8-baseos')
        | first).folder
      }}

    rocky8_appstream: >-
      {{
        (ctx.repositories
        | selectattr('id','equalto','rocky8-appstream')
        | first).folder
      }}

  tasks:

    - name: Display NetBox Context
      debug:
        msg:
          - "Repository URL : {{ repo_url }}"
          - "Gateway        : {{ default_gw }}"
          - "BaseOS Repo    : {{ rocky8_baseos }}"
          - "AppStream Repo : {{ rocky8_appstream }}"

    - name: Ensure Default Gateway is present
      shell: |
        if ! ip route show | grep -q '^default'; then
            echo "Default gateway missing"
            ip route add default via {{ default_gw }}
            exit 2
        else
            echo "Default gateway already configured"
            exit 0
        fi
      register: gw_check
      failed_when: false
      changed_when: gw_check.rc == 2

    - name: Display Target Environment Info
      debug:
        msg: "Processing Agent Node Workflow for {{ inventory_hostname }}"

    - name: Verify DNS resolution for repo server
      shell: |
        getent hosts {{ repo_url | regex_replace('^https?://','') | regex_replace('/.*$','') }}
      register: dns_check
      changed_when: false
      failed_when: dns_check.rc != 0

    - name: Verify BaseOS repository metadata
      uri:
        url: "{{ repo_url }}/{{ rocky8_baseos }}/repodata/repomd.xml"
        method: GET
        status_code: 200
        timeout: 30

    - name: Verify AppStream repository metadata
      uri:
        url: "{{ repo_url }}/{{ rocky8_appstream }}/repodata/repomd.xml"
        method: GET
        status_code: 200
        timeout: 30

    - name: Create backup repository directory
      file:
        path: "/etc/yum.repos.d/{{ backup_dir_name }}"
        state: directory
        mode: "0755"

    - name: Backup existing repositories
      block:

        - name: Find existing repository files
          find:
            paths: /etc/yum.repos.d
            patterns: "*.repo"
            file_type: file
            depth: 1
          register: found_repos

        - name: Move repository files
          command:
            cmd: "mv {{ item.path }} /etc/yum.repos.d/{{ backup_dir_name }}/"
          loop: "{{ found_repos.files }}"
          when: found_repos.matched > 0

    - name: Main Patching Lifecycle
      block:

        - name: Create BaseOS repository
          copy:
            dest: /etc/yum.repos.d/rocky8-baseos.repo
            mode: "0644"
            content: |
              [rocky8-baseos]
              name=Rocky Linux 8 BaseOS
              baseurl={{ repo_url }}/{{ rocky8_baseos }}
              enabled=1
              gpgcheck=0
              sslverify=0

        - name: Create AppStream repository
          copy:
            dest: /etc/yum.repos.d/rocky8-appstream.repo
            mode: "0644"
            content: |
              [rocky8-appstream]
              name=Rocky Linux 8 AppStream
              baseurl={{ repo_url }}/{{ rocky8_appstream }}
              enabled=1
              gpgcheck=0
              sslverify=0

        - name: Clean DNF cache
          shell: dnf clean all

        - name: Build DNF cache
          shell: |
            dnf makecache \
            --disablerepo='*' \
            --enablerepo=rocky8-baseos,rocky8-appstream

        - name: Execute OS patching
          shell: |
            dnf update -y \
              --disablerepo='*' \
              --enablerepo=rocky8-baseos,rocky8-appstream \
              --allowerasing \
              --nobest
          register: dnf_shell_output

        - name: Display patch output
          debug:
            var: dnf_shell_output.stdout_lines

				- name: Check if updates were installed
				set_fact:
					updates_installed: "{{ 'Nothing to do.' not in dnf_shell_output.stdout }}"
				
				- name: Reboot if updates were installed
				reboot:
					reboot_timeout: 900
					msg: "Offline patching completed. Rebooting."
				when: updates_installed

      rescue:

        - name: Restore repositories after failure
          shell: |
            if [ -d "/etc/yum.repos.d/{{ backup_dir_name }}" ]; then
              mv /etc/yum.repos.d/{{ backup_dir_name }}/*.repo \
                 /etc/yum.repos.d/ 2>/dev/null || true
              rmdir /etc/yum.repos.d/{{ backup_dir_name }} \
                 2>/dev/null || true
            fi
          failed_when: true

      always:

        - name: Remove temporary repositories
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /etc/yum.repos.d/rocky8-baseos.repo
            - /etc/yum.repos.d/rocky8-appstream.repo

        - name: Restore original repositories
          shell: |
            if [ -d "/etc/yum.repos.d/{{ backup_dir_name }}" ]; then
              mv /etc/yum.repos.d/{{ backup_dir_name }}/*.repo \
                 /etc/yum.repos.d/ 2>/dev/null || true
              rmdir /etc/yum.repos.d/{{ backup_dir_name }} \
                 2>/dev/null || true
            fi
          changed_when: true

        - name: Final repository cleanup
          shell: dnf clean all
          ignore_errors: true
