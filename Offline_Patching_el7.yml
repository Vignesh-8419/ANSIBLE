---
- name: Offline Infrastructure Patching Orchestrator EL7
  hosts: all
  become: yes
  gather_facts: no
  any_errors_fatal: false

  vars:
    backup_dir_name: "backup_repos_original"
    ansible_python_interpreter: /usr/bin/python

  pre_tasks:

    - name: Load NetBox Context
      set_fact:
        nb_ctx: "{{ config_context[0] }}"

    - name: Build Repository Variables
      set_fact:
        repo_url: "{{ nb_ctx.httpd_server_url | regex_replace('/$','') }}"
        base_repo: "{{ (nb_ctx.repositories | selectattr('id','equalto','base') | first).folder }}"
        patch_repo: "{{ (nb_ctx.repositories | selectattr('id','equalto','patch') | first).folder }}"

  tasks:

    - name: Display NetBox Context
      debug:
        msg:
          - "Repository URL : {{ repo_url }}"
          - "Base Repo      : {{ base_repo }}"
          - "Patch Repo     : {{ patch_repo }}"

#    - name: Verify DNS Resolution
#      shell: |
#        getent hosts {{ repo_url | regex_replace('^https?://','') | regex_replace('/.*$','') }}
#      register: dns_check
#      changed_when: false
#      failed_when: dns_check.rc != 0

    - name: Verify Base Repository Metadata
      uri:
        url: "{{ repo_url }}/{{ base_repo }}/repodata/repomd.xml"
        method: GET
        status_code: 200
        timeout: 30

    - name: Verify Patch Repository Metadata
      uri:
        url: "{{ repo_url }}/{{ patch_repo }}/repodata/repomd.xml"
        method: GET
        status_code: 200
        timeout: 30

    - name: Create Repository Backup Directory
      file:
        path: "/etc/yum.repos.d/{{ backup_dir_name }}"
        state: directory
        mode: "0755"

    - name: Find Existing Repository Files
      find:
        paths: /etc/yum.repos.d
        patterns: "*.repo"
        file_type: file
        depth: 1
      register: found_repos

    - name: Backup Existing Repository Files
      command:
        cmd: "mv {{ item.path }} /etc/yum.repos.d/{{ backup_dir_name }}/"
      loop: "{{ found_repos.files }}"
      when: found_repos.matched > 0

    - block:

        - name: Create Base Repository
          copy:
            dest: /etc/yum.repos.d/base.repo
            mode: "0644"
            content: |
              [base]
              name=CentOS/RHEL7 Base Repository
              baseurl={{ repo_url }}/{{ base_repo }}
              enabled=1
              gpgcheck=0

        - name: Create Patch Repository
          copy:
            dest: /etc/yum.repos.d/patch.repo
            mode: "0644"
            content: |
              [patch]
              name=CentOS/RHEL7 Patch Repository
              baseurl={{ repo_url }}/{{ patch_repo }}
              enabled=1
              gpgcheck=0

        - name: Clean Yum Cache
          command: yum clean all

        - name: Build Yum Cache
          shell: |
            yum makecache \
              --disablerepo='*' \
              --enablerepo=base,patch

        - name: Execute Operating System Patching
          shell: |
            yum update -y \
              --disablerepo='*' \
              --enablerepo=base,patch
          register: yum_shell_output

        - name: Display Patch Output
          debug:
            var: yum_shell_output.stdout_lines

        - name: Determine Whether Updates Were Installed
          set_fact:
            updates_installed: "{{ 'No packages marked for update' not in yum_shell_output.stdout }}"

        - name: Reboot If Updates Were Installed
          reboot:
            reboot_timeout: 900
            msg: "Offline patching completed. Rebooting host."
          when: updates_installed

      rescue:

        - name: Restore Original Repositories After Failure
          shell: |
            if [ -d "/etc/yum.repos.d/{{ backup_dir_name }}" ]; then
              mv /etc/yum.repos.d/{{ backup_dir_name }}/*.repo /etc/yum.repos.d/ 2>/dev/null || true
              rmdir /etc/yum.repos.d/{{ backup_dir_name }} 2>/dev/null || true
            fi

        - name: Fail Playbook
          fail:
            msg: "Offline patching failed. Original repositories restored."

      always:

        - name: Remove Temporary Repository Files
          file:
            path: "{{ item }}"
            state: absent
          loop:
            - /etc/yum.repos.d/base.repo
            - /etc/yum.repos.d/patch.repo

        - name: Restore Original Repository Files
          shell: |
            if [ -d "/etc/yum.repos.d/{{ backup_dir_name }}" ]; then
              mv /etc/yum.repos.d/{{ backup_dir_name }}/*.repo /etc/yum.repos.d/ 2>/dev/null || true
              rmdir /etc/yum.repos.d/{{ backup_dir_name }} 2>/dev/null || true
            fi
          changed_when: true

        - name: Final Yum Cleanup
          command: yum clean all
          ignore_errors: true
