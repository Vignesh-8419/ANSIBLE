---
- name: Bootstrap Python 3.12 on managed hosts
  hosts: all
  gather_facts: false
  become: true

  tasks:
    - name: Check if Python 3.12 is already installed
      raw: test -x /usr/bin/python3.12
      register: python3_12_check
      changed_when: false
      failed_when: false

    - name: Install Python 3.12
      raw: |
        dnf install -y python3.12
      when: python3_12_check.rc != 0

    - name: Set Python interpreter for subsequent tasks
      set_fact:
        ansible_python_interpreter: /usr/bin/python3.12

    - name: Verify Python 3.12 installation
      raw: /usr/bin/python3.12 --version
      register: python_version

    - name: Reset SSH connection
      meta: reset_connection

    - name: Display installed version
      debug:
        var: python_version.stdout
