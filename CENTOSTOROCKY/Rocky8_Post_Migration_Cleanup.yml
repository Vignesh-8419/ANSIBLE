---
- name: Rocky Linux 8 Post Migration Cleanup
  hosts: "{{ target_hosts.split(',') | map('trim') | map('regex_replace', '$', '*') | join(',') }}"
  become: true
  gather_facts: false

  pre_tasks:

    - name: Ensure Python is installed
      raw: |
        if ! command -v python3 >/dev/null 2>&1 && ! command -v python >/dev/null 2>&1; then
          dnf -y install python3
        fi
      changed_when: false

    - meta: reset_connection

    - name: Gather facts
      setup:

    - name: Ensure we are running on Rocky Linux 8
      fail:
        msg: "This playbook must be run only on Rocky Linux 8!"
      when:
        - ansible_distribution != "Rocky"
        - ansible_distribution_major_version != "8"

  tasks:

    ################################################################
    # Basic repo/RPMDB cleanup
    ################################################################

    - name: Ensure backup directory exists
      file:
        path: /etc/yum.repos.d/backup
        state: directory
        mode: "0755"

    - name: Move repository files to backup
      shell: |
        shopt -s extglob
        mv /etc/yum.repos.d/!(backup) /etc/yum.repos.d/backup/ || true
      args:
        executable: /bin/bash

    - name: Create Rocky Linux repositories
      copy:
        dest: /etc/yum.repos.d/base.repo
        mode: "0644"
        content: |
          [rocky8-baseos]
          name=Rocky Linux 8 BaseOS
          baseurl=http://192.168.253.136/repo/rocky8/BaseOS/
          enabled=1
          gpgcheck=0

          [rocky8-appstream]
          name=Rocky Linux 8 AppStream
          baseurl=http://192.168.253.136/repo/rocky8/AppStream/
          enabled=1
          gpgcheck=0

    - name: Backup RPM database
      command: mv /var/lib/rpm /var/lib/rpm.bak-{{ ansible_date_time.epoch }}
      args:
        creates: /var/lib/rpm.bak-{{ ansible_date_time.epoch }}

    - name: Create new RPM database directory
      file:
        path: /var/lib/rpm
        state: directory
        mode: "0755"

    - name: Initialize RPM database
      command: rpm --initdb

    - name: Restore Packages file
      command: cp -av /var/lib/rpm.bak-{{ ansible_date_time.epoch }}/Packages /var/lib/rpm/
      ignore_errors: yes

    - name: Remove RPM database locks
      shell: rm -f /var/lib/rpm/__db.*
      ignore_errors: yes

    - name: Rebuild RPM database
      command: rpm --rebuilddb
      ignore_errors: yes

    - name: Clean DNF cache
      command: dnf clean all
      ignore_errors: yes

    - name: Verify RPM database
      command: dnf list installed
      register: rpmdb_test
      ignore_errors: yes

    - name: Show RPM database status
      debug:
        msg: "{{ rpmdb_test.stdout | default('RPM database verification failed') }}"

    ####################################################################
    # Kernel Cleanup
    ####################################################################

    - name: List old EL7 kernel directories
      shell: ls -d /lib/modules/*.el7* || true
      register: old_kernels
      changed_when: false

    - name: Remove weak-modules for old EL7 kernels
      shell: |
        for k in $(ls -d /lib/modules/*.el7* 2>/dev/null | xargs -n1 basename); do
          /usr/sbin/weak-modules --remove-kernel "$k" || true
        done

    - name: Remove old kernels from kernel-install
      shell: |
        for k in $(ls -d /lib/modules/*.el7* 2>/dev/null | xargs -n1 basename); do
          /bin/kernel-install remove "$k" "/lib/modules/$k/vmlinuz" || true
        done

    - name: Find old EL7 kernel directories
      find:
        paths: /lib/modules
        patterns: "*.el7*"
        file_type: directory
      register: old_kernel_dirs

    - name: Remove old EL7 kernel directories
      file:
        path: "{{ item.path }}"
        state: absent
      loop: "{{ old_kernel_dirs.files }}"

    ####################################################################
    # EL7 RPM Cleanup
    ####################################################################

    - name: Find leftover EL7 RPMs
      shell: |
        rpm -qa | \
        grep '\.el7' | \
        grep -vE '^(gpg-pubkey|libmoduled|katello-ca-consumer)' | \
        sort
      register: el7_rpms
      changed_when: false

    - name: Save EL7 package list
      copy:
        dest: /tmp/rhel7.txt
        content: "{{ el7_rpms.stdout }}"

    - name: Remove leftover EL7 RPMs
      shell: |
        while read pkg; do
          [ -n "$pkg" ] && rpm -e --nodeps "$pkg" || true
        done < /tmp/rhel7.txt
      when: el7_rpms.stdout != ""

    ####################################################################
    # Remove Leapp packages
    ####################################################################

    - name: Remove Leapp packages
      dnf:
        name:
          - leapp-pp
          - leapp-deps-el8
          - leapp-repository-deps-el8
        state: absent

    - name: Remove Leapp logs and temporary directories
      file:
        path: "{{ item }}"
        state: absent
      loop:
        - /var/log/leapp
        - /root/tmp_leapp_py3
        - /var/lib/leapp

    ####################################################################
    # Kernel Verification
    ####################################################################

    - name: Reinstall current kernel-core
      shell: dnf reinstall -y kernel-core-$(uname -r)

    - name: Verify EL7 kernels are removed from grub
      shell: |
        grubby --info=ALL | grep '\.el7' || echo "Old EL7 kernels are not present in bootloader."
      register: grub_check
      changed_when: false

    - name: Display grub verification
      debug:
        var: grub_check.stdout_lines

    ####################################################################
    # Rescue Image Cleanup
    ####################################################################

    - name: Remove old rescue images
      shell: rm -f /boot/vmlinuz-*rescue* /boot/initramfs-*rescue*
      args:
        warn: false

    ####################################################################
    # Rescue Image Regeneration
    ####################################################################

    - name: Regenerate rescue image
      shell: |
        /usr/lib/kernel/install.d/51-dracut-rescue.install \
          add "$(uname -r)" /boot "/boot/vmlinuz-$(uname -r)"

    - name: List regenerated rescue images
      shell: ls -1 /boot/vmlinuz-*rescue* /boot/initramfs-*rescue*
      register: rescue_files
      changed_when: false

    - name: Display rescue images
      debug:
        var: rescue_files.stdout_lines

    - name: Validate rescue initramfs
      shell: |
        lsinitrd /boot/initramfs-*rescue*.img | \
        grep -qm1 "$(uname -r)/kernel/" && echo OK || echo FAIL
      register: rescue_validation
      changed_when: false

    - name: Display rescue validation
      debug:
        var: rescue_validation.stdout_lines

    - name: Display rescue grub entry
      shell: grubby --info "$(ls /boot/vmlinuz-*rescue*)"
      register: grub_rescue
      changed_when: false

    - name: Show rescue grub information
      debug:
        var: grub_rescue.stdout_lines

    ####################################################################
    # Final Cleanup
    ####################################################################

    - name: Clean DNF cache
      command: dnf clean all
      changed_when: false

    - name: Remove temporary EL7 package list
      file:
        path: /tmp/rhel7.txt
        state: absent

    ####################################################################
    # Final Reboot
    ####################################################################

    - name: Final reboot after Rocky Linux cleanup
      reboot:
        msg: "Final reboot after Rocky Linux 8 post-migration cleanup"
        connect_timeout: 5
        reboot_timeout: 600
        pre_reboot_delay: 10
        post_reboot_delay: 30
